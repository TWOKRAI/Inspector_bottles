# Пресет: русские буквы на дисках — эталоны вырезаны из РЕАЛЬНЫХ фото.
#
# Эталоны готовит инструмент (один раз), из 4 снимков на букву (0/90/180/270°):
#   python -m Services.dataset_gen.tools.cut_real_disks \
#       --input data/real_photos --out data/dataset_gen/ru_letters_real/sprites
#
# Отличие от ru_letters_disk.yaml — только источник эталонов (реальные диски).
# Геометрию (поворот 0..359°) и фотометрию добавляет движок; угол — ground truth.
# Относительные пути резолвятся от каталога этого файла.

catalog:
  classes_dir: ../../../data/dataset_gen/ru_letters_real/sprites
  backgrounds_dir: ../../../data/backgrounds   # тестовый тёмно-синий фон; замените на фото сцены

output:
  size: [128, 128]         # (H, W) — кратно 32 (требование downsampling-сети); вход модели
  frames_per_class: 300
  supersample: 1.5         # композиция крупнее + downscale → сглаживает шов вклейки

placement:
  # диск занимает ~такую долю кадра, как после live-кропа (center_crop по радиусу
  # с полями): держим train-фрейминг близким к боевому кропу
  object_size_frac: [0.72, 0.95]
  keep_inside: true

symmetry:
  # ДЕТЕРМИНИРОВАННЫЕ overrides (вычислены detect_symmetry по чистым рендерам 33
  # глифов — топология симметрии шрифт-инвариантна). auto_detect выключен:
  # на шумных реальных вырезах большой белый диск разбавляет метрику.
  auto_detect: false
  threshold: 0.05
  rel_threshold: 0.3
  full_angles: [30, 45, 60, 90, 120, 135]
  overrides:                # «любая из двух ориентаций ОК» → 180 безопасно
    О: full                 # любой угол одинаков → angle_valid=False, робот не доворачивает
    Ж: "180"
    И: "180"                # под ПОВОРОТОМ 180° (не зеркало!) И симметрична (d180=0.009)
    Н: "180"
    Ф: "180"
    Х: "180"

augment:
  rotation: {enabled: true, range: [0, 360]}              # главный сигнал — угол как GT-метка
  shift:    {enabled: true, frac: 0.04}                   # небольшой сдвиг центра
  scale:    {enabled: true, range: [0.92, 1.06]}          # разброс расстояния до камеры
  brightness_contrast: {enabled: true, prob: 0.9, brightness: [-18, 18], contrast: [0.85, 1.15]}
  gamma:    {enabled: true, prob: 0.3, gamma: [0.8, 1.25]}
  vignette: {enabled: true, prob: 0.3, strength: [0.1, 0.35], radius_frac: [0.45, 0.7]}
  gaussian_blur: {enabled: true, prob: 0.4, sigma: [0.4, 1.6]}     # мягкий расфокус
  motion_blur:   {enabled: true, prob: 0.3, length: [3, 9]}        # конвейер движется
  noise:         {enabled: true, prob: 0.6, std: [2, 6]}           # мягкий шум («не сильно грубый»)
  color_temperature: {enabled: true, prob: 0.4, shift: [-0.06, 0.06]}
  channel_shift: {enabled: true, prob: 0.3, max_shift: 8}
  jpeg:  {enabled: true, prob: 0.3, quality: [60, 92]}
  glare: {enabled: true, prob: 0.4, intensity: [30, 90], radius_frac: [0.15, 0.4]}  # глянец диска
  shadow: {enabled: true, prob: 0.3, strength: [0.12, 0.35], softness_frac: [0.25, 0.6]}
  contact_shadow: {enabled: false}     # фон однородный — контактная тень не нужна
  occlusion: {enabled: true, prob: 0.15, count: [1, 1], size_frac: [0.04, 0.1]}  # грязь/перекрытие

seed: 42
