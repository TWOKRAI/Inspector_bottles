[project]
name = "inspector-bottles"
version = "0.1.0"
description = "Multiprocess framework for bottle inspection — camera-based defect detection"
requires-python = ">=3.11"
dependencies = [
    # Core framework
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "sqlalchemy>=2.0",
    "numpy>=2.0",
    "PyYAML>=6.0",
    "psutil>=5.9",

    # GUI
    "PyQt5>=5.15,<5.16",
    "PyQt5-Qt5==5.15.2",
    "QDarkStyle>=3.2",

    # Vision / image
    "opencv-python>=4.5",
    "Pillow>=9.0",

    # Data / plotting
    "pandas>=2.0",
    "matplotlib>=3.7",
    "plotly>=5.0",
    "seaborn>=0.13",
    "openpyxl>=3.1",

    # Camera (GigE Vision)
    "harvesters>=1.4",

    # Network / utils
    "requests>=2.28",
    "environs>=9.5",

    # Simulation
    "pygame>=2.6",

    # Vector DB
    "pymilvus>=2.4",
]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "ipykernel>=6.29",
]

[tool.pytest.ini_options]
testpaths = [
    "Inspector_prototype/multiprocess_framework/refactored",
    "Inspector_prototype/multiprocess_prototype/tests",
]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
