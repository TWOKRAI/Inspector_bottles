# pre-commit hooks — Inspector_bottles
# Установка: pre-commit install
# Ручной прогон: pre-commit run --all-files
# Обновление версий: pre-commit autoupdate

# robot/ — firmware/PLC/Colab (Lua, экспортированные ноутбуки, pc-скрипты), не модульный Python проекта
exclude: ^(multiprocess_prototype_backup/|robot/)

repos:
  # ── Общие проверки ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements

  # ── Ruff (линтер + форматтер) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── pyright (type checking, gradual, ADVISORY) ──
  # Конфигурация читается из [tool.pyright] в pyproject.toml.
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
        additional_dependencies: [pydantic>=2.13]
        pass_filenames: false
        # gradual: ошибки печатаются в push-логе, но не блокируют push.
        # Когда долг будет снижен — убрать `|| true` (или `--warnings`).
        entry: bash -c "pyright multiprocess_framework multiprocess_prototype || true"
        language: python
        types: [python]
        stages: [pre-push]

  # ── bandit (security scanning) ──
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -q]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^(tests/|multiprocess_prototype_backup/|\.claude/)

  # ── Журнал коммитов в docs/sessions/YYYY-MM-DD.md ──
  # Заменяет старый Stop-хук Claude — теперь запись попадает в сам коммит,
  # а не висит как unstaged-изменение после него.
  - repo: local
    hooks:
      - id: session-log
        name: append session log to docs/sessions/
        entry: bash .claude/hooks/git/pre-commit-session-log.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
