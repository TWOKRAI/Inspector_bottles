# pre-commit hooks — Inspector_bottles
# Установка: pre-commit install
# Ручной прогон: pre-commit run --all-files
# Обновление версий: pre-commit autoupdate

exclude: ^multiprocess_prototype_backup/

repos:
  # ── Общие проверки ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements

  # ── Ruff (линтер + форматтер) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── mypy (type checking, gradual) ──
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary]
        additional_dependencies: [pydantic>=2.13]
        pass_filenames: false
        # gradual: запускаем только на framework, не блокируем коммит
        entry: mypy multiprocess_framework
        language: python
        types: [python]
        stages: [pre-push]  # на push, не на каждый коммит (пока gradual)

  # ── bandit (security scanning) ──
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -q]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^(tests/|multiprocess_prototype_backup/)
