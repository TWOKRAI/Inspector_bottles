# Inspector_bottles — архитектурные инварианты sentrux
#
# Проверка:
#   /sentrux-check        (CLI, exit 0/1, для CI)
#   /sentrux-rules        (MCP, интерактивно)
#
# Структура слоёв (см. docs/refactors/2026-05_arch_cleanup.md):
#   framework  → чистый backend-фреймворк (process/IPC/state/UI-toolkit)
#   Services   → прикладные сервисы с внешними зависимостями (sql, hikvision)
#   Plugins    → vocabulary плагинов, переиспользуется между приложениями
#   app        → конкретное приложение (multiprocess_prototype)
#
# Направление импортов: app → Plugins → Services → framework. Обратные импорты запрещены.

# ──────────────────────────────────────────────────────────────────────────────
# Quality gates (scores в шкале 0.0-1.0 — sentrux принимает именно так)
# ──────────────────────────────────────────────────────────────────────────────
# Текущее (2026-05-10 после Phase 1):
#   quality=0.62, modularity=0.51, acyclicity=0.50, depth=0.67,
#   equality=0.62, redundancy=0.88
# Мягкие пороги чуть ниже текущих — ужесточаем по мере прогресса (Phase 4-6).

[constraints]
min_quality      = 0.60      # цель ≥ 0.75 после Phase 4-6
min_modularity   = 0.45      # просядет после carve-outs, вырастет после Phase 5 Plugins
min_acyclicity   = 0.45      # цель 0.90 (raw=0)
min_depth        = 0.53      # ВРЕМЕННО (принятый долг): god-split трека F добавил 6-й уровень вложенности пакетов (факт 0.5714 < 0.60). Depth-reduction — задача Ф5.18; вернуть 0.65 в Ф8 H.5. Ф0.3→0.60, Ф4-добор→0.57, telemetry-merge (frontend_module/state read-model re-export, факт 0.5333)→0.53. Depth — принято warning-не-блок (owner 2026-07-15), не гоняться за числом; восстановить в Ф8 H.5
min_equality     = 0.60
min_redundancy   = 0.80

max_cycles       = 2         # текущее 1; запас на backup-папки, цель 0
no_god_files     = true

# ──────────────────────────────────────────────────────────────────────────────
# Слои (порядок снизу вверх)
# ──────────────────────────────────────────────────────────────────────────────

[[layers]]
name  = "framework"
paths = ["multiprocess_framework/*"]
order = 0

[[layers]]
name  = "services"
paths = ["Services/*"]
order = 1

[[layers]]
name  = "plugins"
paths = ["Plugins/*"]   # ← пока пусто, наполнится в Phase 5
order = 2

[[layers]]
name  = "application"
paths = ["multiprocess_prototype/*"]
order = 3

# backend_ctl — headless-драйвер диагностики: гоняет прототип без GUI (BACKEND_CTL=1),
# request/reply, телеметрия, SQL-sink. Это ТУЛИНГ (как scripts/), а не упорядоченный
# слой: он легитимно импортирует приложение (драйвит его), поэтому в модель [[layers]]
# НЕ добавляем (иначе layer_direction ложно ругается на backend_ctl → application).
# Ограничиваем только обратное направление через boundaries ниже.

# ──────────────────────────────────────────────────────────────────────────────
# Жёсткие границы (deny-patterns)
# ──────────────────────────────────────────────────────────────────────────────

# Никто из продуктовых слоёв не импортирует диагностический backend_ctl (он сверху)
[[boundaries]]
from   = "multiprocess_framework/*"
to     = "backend_ctl/*"
reason = "framework не зависит от диагностического драйвера"

[[boundaries]]
from   = "Services/*"
to     = "backend_ctl/*"
reason = "Services не зависят от backend_ctl"

[[boundaries]]
from   = "Plugins/*"
to     = "backend_ctl/*"
reason = "Plugins не зависят от backend_ctl"

[[boundaries]]
from   = "multiprocess_prototype/*"
to     = "backend_ctl/*"
reason = "приложение не импортирует свой диагностический драйвер (backend_ctl → app, не наоборот)"

# framework → ничто прикладное
[[boundaries]]
from   = "multiprocess_framework/*"
to     = "multiprocess_prototype/*"
reason = "framework не знает про конкретное приложение (Phase 1.1 закрыта)"

[[boundaries]]
from   = "multiprocess_framework/*"
to     = "Services/*"
reason = "framework не знает про Services (Phase 4.3 после carve-out sql)"

[[boundaries]]
from   = "multiprocess_framework/*"
to     = "Plugins/*"
reason = "framework не знает про vocabulary плагинов (Phase 5)"

# app_module — верхний композиционный ярус framework («рыба-шаблон», Ф5.11).
# Его импортирует ТОЛЬКО прикладной слой (прототип / examples); внутри framework
# никакой другой модуль на него не ссылается (направление: app_module → остальные).
# Внутренние импорты самого app_module — относительные (sentrux не резолвит relative),
# поэтому этот boundary ловит только чужие absolute-импорты, не ложно-срабатывая на self.
[[boundaries]]
from   = "multiprocess_framework/*"
to     = "multiprocess_framework/modules/app_module/*"
reason = "app_module — верхняя крыша: внутри framework его не импортируют (Ф5.11, app-template-idea §3)"

# examples/ — второй независимый потребитель framework уровня 2 («рыба», Ф5.13),
# forcing function против Inspector-специфики. Не должен зависеть от конкретного
# приложения (multiprocess_prototype) — иначе не доказывает самодостаточность
# app_module. Enforce также grep-контракт-тестом (app_module/tests/test_contract.py).
[[boundaries]]
from   = "examples/*"
to     = "multiprocess_prototype/*"
reason = "examples — второй потребитель framework уровня 2, не зависит от прикладного прототипа (Ф5.13)"

# Services → не знают про вышестоящие слои
[[boundaries]]
from   = "Services/*"
to     = "multiprocess_prototype/*"
reason = "Service-слой не зависит от приложения"

[[boundaries]]
from   = "Services/*"
to     = "Plugins/*"
reason = "Service не зависит от плагинов"

# Services/auth — чистый backend без UI (PR1 auth-rbac, ADR-Auth-001..005).
# UI логина и админ-панель — в multiprocess_prototype (PR2), не в auth.
[[boundaries]]
from   = "Services/auth/*"
to     = "multiprocess_framework/modules/frontend_module/*"
reason = "Services/auth — backend, не должен импортировать Qt-слой frontend_module (PR1 auth-rbac)"

# Services/auth — чистый backend, импорт Qt-виджетов и app-кода запрещён (PR2)
[[boundaries]]
from   = "Services/auth/*"
to     = "multiprocess_prototype/*"
reason = "Services/auth — чистый backend, импорт Qt-виджетов и app-кода запрещён (PR2 auth-rbac)"

# Plugins → не знают про конкретное приложение
[[boundaries]]
from   = "Plugins/*"
to     = "multiprocess_prototype/*"
reason = "плагин — переиспользуемая единица, не должен зависеть от конкретного app (Phase 5.2)"

# Архивные / удалённые модули — никто не должен импортировать
[[boundaries]]
from   = "*"
to     = "multiprocess_prototype_v2/*"
reason = "архивный прототип v2 удалён, импорты запрещены"

[[boundaries]]
from   = "*"
to     = "multiprocess_prototype_backup/*"
reason = "backup-снэпшот удалён (e128b930), импорты запрещены"

[[boundaries]]
from   = "multiprocess_framework/*"
to     = "hikvision_camera_module*/*"
reason = "старые draft-папки hikvision удалены, framework не должен импортировать"

# Adapter-слой (Phase C cross-tab refactor) — UI-agnostic
# Adapter'ы не должны импортировать frontend-виджеты (PySide6/Qt).
# G.3: TopologyHolder удалён, adapters больше не импортируют frontend (Q1-исключение закрыто).
[[boundaries]]
from   = "multiprocess_prototype/adapters/*"
to     = "multiprocess_prototype/frontend/widgets*"
reason = "adapters не импортируют Qt-виджеты (UI-agnostic)."

[[boundaries]]
from   = "multiprocess_prototype/adapters/*"
to     = "PySide6/*"
reason = "adapters UI-agnostic — PySide6 импорт запрещён. Adapter-слой Phase C."

# Domain-слой (Phase D cross-tab refactor) — чистый Python, без UI и без adapters
# domain/ знает только о себе: entities, events, commands, protocols, EventBus, AppServices.
# UI-зависимости и adapter-слой появляются выше (frontend/ и adapters/).
[[boundaries]]
from   = "multiprocess_prototype/domain/*"
to     = "multiprocess_prototype/adapters/*"
reason = "domain UI-agnostic и adapter-agnostic — знает только собственные протоколы. Phase D."

[[boundaries]]
from   = "multiprocess_prototype/domain/*"
to     = "multiprocess_prototype/frontend/*"
reason = "domain не импортирует Qt/frontend. Phase D Q1 — UI-agnostic invariant."

[[boundaries]]
from   = "multiprocess_prototype/domain/*"
to     = "PySide6/*"
reason = "domain — pure Python, без Qt. Phase D."

# frontend → adapters разрешено (Phase D добавил AppServices DI в frontend/).
# Явное разрешение документирует намерение; sentrux использует boundaries как deny-список,
# поэтому отсутствие boundary = разрешено. Этот комментарий — архитектурный маркер.
#
# Направление: frontend/ использует adapters/ через AppServices Protocol'ы.
# Обратное (adapters/ импортирует frontend/) — запрещено выше.
#
# Phase F удалит прямые ctx.extras[...] → останется только services.X через Protocols.

# Граница фронт/бэк прототипа (Ф2 frontend-constructor, 2026-07). До Ф2 сцепление
# было де-факто нулевым на импортах (только строковый путь frontend/styles/themes
# в manifest.py, устранён Ф2 T2.3, и process_class-ссылка на GuiProcess в
# base.yaml/presentation.yaml — YAML-конфиг, не Python-импорт, sentrux не видит).
# Инвариант закрепляет это структурно: backend/ не должен ЗНАТЬ про frontend/ на
# уровне Python-импортов (обратное — frontend/ форвард-импортит backend/launch,
# config, state — разрешено, это forward-направление хардкод-shell).
[[boundaries]]
from   = "multiprocess_prototype/backend/*"
to     = "multiprocess_prototype/frontend/*"
reason = "backend headless-first (Ф2) — не импортирует Qt-слой frontend/. Обратное (frontend → backend) разрешено — форвард-импорт хардкод-shell."
