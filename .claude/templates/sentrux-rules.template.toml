# .sentrux/rules.toml — шаблон правил архитектуры
# Адаптировать: [[layers]] и [[boundaries]] под свой проект

# ── Глобальные ограничения качества ──
[constraints]
min_quality = 0.50                  # минимальный общий score (0.0-1.0)
min_modularity = 0.40               # связность модулей
min_acyclicity = 0.40               # отсутствие циклов
# Стартовые пороги низкие — поднимай после первого baseline

# ── Слои архитектуры (пример: framework → services → app) ──
# Каждый слой = логическая группа путей. Адаптируй под свой проект.

# [[layers]]
# name = "framework"
# paths = ["src/framework/**"]
# description = "Базовый фреймворк, не должен зависеть ни от чего"

# [[layers]]
# name = "services"
# paths = ["src/services/**"]
# description = "Бизнес-сервисы, зависят только от framework"

# [[layers]]
# name = "app"
# paths = ["src/app/**", "main.py"]
# description = "Композиция всего, может импортировать всё"

# ── Границы импортов (что нельзя импортировать) ──
# Энфорсится через sentrux check (exit 1 при нарушении)

# [[boundaries]]
# from = "framework"
# deny = ["services", "app"]
# reason = "framework — низший слой, не знает о выше"

# [[boundaries]]
# from = "services"
# deny = ["app"]
# reason = "services не должны импортировать app (только наоборот)"

# ── Игнорируемые пути ──
[ignore]
paths = [
    "**/.venv/**",
    "**/__pycache__/**",
    "**/tests/**",                  # тесты не участвуют в анализе слоёв
    "**/migrations/**",
    "**/_archive/**",
    "**/_backup/**",
]
