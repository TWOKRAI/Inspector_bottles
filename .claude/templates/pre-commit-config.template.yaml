# pre-commit-config.yaml — шаблон quality gates
# Адаптировать: entry в mypy hook (заменить на свой главный пакет)
#
# Установка:
#   uv run pre-commit install
#   uv run pre-commit install --hook-type pre-push

repos:
  # ── Общие проверки ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements

  # ── Ruff (lint + format) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── mypy (gradual, на pre-push) ──
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary]
        additional_dependencies: [pydantic>=2.13]
        pass_filenames: false
        entry: mypy PROJECT_NAME                # ← замени на свой пакет
        language: python
        types: [python]
        stages: [pre-push]

  # ── bandit (security scanning) ──
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -q]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/
