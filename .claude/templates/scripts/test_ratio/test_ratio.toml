# Configuration for scripts/test_ratio/test_ratio.py
#
# Per module: LOC in test zones ÷ LOC in production code.
# Goal: quick snapshot of "how well-tested a module is by volume".

[scan]
# Roots where each direct subdirectory is treated as a separate module.
# Common defaults for a src-layout Python project:
module_roots = [
    "src",
]
# If your project uses a flat layout instead, replace with the actual roots, e.g.:
#   module_roots = ["app", "lib"]

[detect]
# Test directory marker inside a module.
test_dir = "tests"
# Additional test markers (fnmatch on filename).
test_file_patterns = ["test_*.py", "*_test.py", "conftest.py"]

[exclude]
# Subdirectories inside a module not counted as either tests or code.
dirs = [
    "__pycache__", ".git", ".venv", "venv",
    "node_modules", ".qex", ".sentrux",
    ".mypy_cache", ".pytest_cache", ".ruff_cache",
    "build", "dist",
    "docs", "archive", "_examples",
]
file_patterns = ["__init__.py"]   # usually empty, skews ratio

[count]
# What counts as a "code" line: non_blank | non_blank_non_comment | all
mode = "non_blank_non_comment"
encoding = "utf-8"

[output]
format = "table"        # table | json | csv
sort_by = "ratio"       # ratio | code | tests | name
sort_order = "asc"      # asc — modules with lowest coverage on top
limit = 0
# HEALTH column threshold: ratio >= warn_threshold → ok, < warn → !, no tests → x
warn_threshold = 0.3
