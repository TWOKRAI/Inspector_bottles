# rules.template.toml — универсальный шаблон архитектурных инвариантов sentrux
#
# Назначение:
#   Стартовая точка для настройки sentrux в новом проекте.
#   Определяет quality-gates, слои архитектуры и жёсткие границы импортов.
#
# Как использовать:
#   cp .claude/mcp/sentrux/rules.template.toml .sentrux/rules.toml
#   Затем отредактируй .sentrux/rules.toml под свой проект:
#     - адаптируй пороги [constraints] к текущим метрикам
#     - раскомментируй и заполни [[layers]] своими путями
#     - раскомментируй и заполни [[boundaries]] своими правилами
#
# Подробнее: .claude/mcp/sentrux/README.md
#
# Проверка после настройки:
#   /sentrux-check   (CLI, exit 0/1, для CI)
#   /sentrux-rules   (MCP, интерактивно)

# ──────────────────────────────────────────────────────────────────────────────
# Quality gates (scores в шкале 0.0–1.0)
# Мягкие дефолты для старта — ужесточать по мере роста проекта.
# ──────────────────────────────────────────────────────────────────────────────

[constraints]
min_quality      = 0.50      # мягкий порог для старта, ужесточать по мере роста
min_modularity   = 0.40
min_acyclicity   = 0.40
min_depth        = 0.50
min_equality     = 0.50
min_redundancy   = 0.70
max_cycles       = 0
no_god_files     = true

# ──────────────────────────────────────────────────────────────────────────────
# Слои архитектуры (порядок снизу вверх)
#
# Раскомментируй и адаптируй под свой проект.
# order — порядок снизу вверх (0 = ядро, N = приложение).
# Импорты разрешены только сверху вниз (order N → order 0).
# ──────────────────────────────────────────────────────────────────────────────

# [[layers]]
# name  = "core"
# paths = ["src/core/*"]
# order = 0
#
# [[layers]]
# name  = "services"
# paths = ["src/services/*"]
# order = 1
#
# [[layers]]
# name  = "app"
# paths = ["src/app/*"]
# order = 2

# ──────────────────────────────────────────────────────────────────────────────
# Жёсткие границы (deny-patterns)
#
# Запрет импорта из `from` в `to`.
# reason — обязательное поле, объясняет почему граница нужна.
# ──────────────────────────────────────────────────────────────────────────────

# [[boundaries]]
# from   = "src/core/*"
# to     = "src/app/*"
# reason = "ядро не должно зависеть от приложения"
#
# [[boundaries]]
# from   = "src/services/*"
# to     = "src/app/*"
# reason = "сервисный слой не зависит от конкретного приложения"
