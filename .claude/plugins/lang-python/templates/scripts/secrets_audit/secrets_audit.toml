# Конфигурация для scripts/secrets_audit/secrets_audit.py

[scan]
root = "."
recursive = true
follow_symlinks = false

[formats]
# Расширения, которые сканируем. Пустой = все.
include = [
    ".py", ".js", ".ts", ".jsx", ".tsx",
    ".java", ".kt", ".go", ".rs", ".rb", ".php",
    ".sh", ".bash", ".zsh", ".ps1",
    ".yaml", ".yml", ".toml", ".json", ".ini", ".env",
    ".md", ".txt", ".conf", ".cfg",
    ".html", ".xml",
]

[exclude]
dirs = [
    "__pycache__", ".git", ".venv", "venv", "env",
    "node_modules", ".qex", ".sentrux",
    ".mypy_cache", ".pytest_cache", ".ruff_cache",
    "build", "dist", "*.egg-info",
    "data", "logs", "tmp",
]
file_patterns = [
    "*.lock", "*.min.js", "*.min.css",
    "*.pyc", "*.so", "*.dll", "*.exe",
    "package-lock.json", "uv.lock", "poetry.lock",
]
# Глобы по относительному пути от scan.root
path_patterns = [
    "tests/fixtures/**",
    "tests/data/**",
    "**/test_*.py",  # тесты часто содержат фейковые ключи как fixtures
    "**/conftest.py",
    # Сам скрипт содержит regex'ы паттернов в конфиге → даёт «self-hits».
    "scripts/secrets_audit/**",
    "**/secrets_audit/**",  # для seed-репо и любого вложенного размещения
]

[detect]
# Порог энтропии Шеннона по умолчанию (для паттернов с entropy_check=true)
default_min_entropy = 4.0

# --- Cloud провайдеры ---

[[detect.patterns]]
name = "aws_access_key_id"
regex = '''\bAKIA[0-9A-Z]{16}\b'''
entropy_check = false

[[detect.patterns]]
name = "aws_secret_access_key"
# Контекстный: рядом со словом aws_secret/aws_secret_access_key и =
regex = '''(?i)aws[_\-]?secret[_\-]?(access[_\-]?)?key\s*[:=]\s*["']?([A-Za-z0-9/+=]{40})["']?'''
entropy_check = true
min_entropy = 4.5

[[detect.patterns]]
name = "gcp_service_account"
regex = '''"type"\s*:\s*"service_account"'''
entropy_check = false

[[detect.patterns]]
name = "gcp_api_key"
regex = '''\bAIza[0-9A-Za-z_\-]{35}\b'''
entropy_check = false

[[detect.patterns]]
name = "azure_storage_key"
regex = '''(?i)(AccountKey|SharedAccessKey)\s*=\s*[A-Za-z0-9+/=]{40,}'''
entropy_check = true
min_entropy = 4.5

# --- Code hosting / CI ---

[[detect.patterns]]
name = "github_pat_classic"
regex = '''\bghp_[A-Za-z0-9]{36}\b'''
entropy_check = false

[[detect.patterns]]
name = "github_pat_fine_grained"
regex = '''\bgithub_pat_[A-Za-z0-9_]{82}\b'''
entropy_check = false

[[detect.patterns]]
name = "gitlab_pat"
regex = '''\bglpat-[A-Za-z0-9_\-]{20,}\b'''
entropy_check = false

# --- LLM провайдеры ---

[[detect.patterns]]
name = "openai_api_key"
regex = '''\bsk-[A-Za-z0-9]{20,}\b'''
entropy_check = true
min_entropy = 4.0

[[detect.patterns]]
name = "anthropic_api_key"
regex = '''\bsk-ant-(api03|admin01)-[A-Za-z0-9_\-]{80,}\b'''
entropy_check = false

# --- Платежи ---

[[detect.patterns]]
name = "stripe_live_key"
regex = '''\b(sk|rk)_live_[A-Za-z0-9]{20,}\b'''
entropy_check = false

# --- Мессенджеры ---

[[detect.patterns]]
name = "slack_token"
regex = '''\bxox[baprs]-[0-9A-Za-z\-]{10,}\b'''
entropy_check = false

[[detect.patterns]]
name = "telegram_bot_token"
regex = '''\b[0-9]{8,12}:[A-Za-z0-9_\-]{35}\b'''
entropy_check = false

# --- Криптография ---

[[detect.patterns]]
name = "private_key_pem"
regex = '''-----BEGIN [A-Z ]*PRIVATE KEY-----'''
entropy_check = false

[[detect.patterns]]
name = "ssh_private_key"
regex = '''-----BEGIN OPENSSH PRIVATE KEY-----'''
entropy_check = false

# --- JWT ---

[[detect.patterns]]
name = "jwt_token"
regex = '''\beyJ[A-Za-z0-9_\-]{10,}\.eyJ[A-Za-z0-9_\-]{10,}\.[A-Za-z0-9_\-]{10,}\b'''
entropy_check = false

# --- Network ---

[[detect.patterns]]
name = "basic_auth_url"
# https://user:password@host — фиксируем не-пустой пароль не короче 4 символов
regex = '''https?://[^\s/:@]+:[^\s/@]{4,}@[^\s/]+'''
entropy_check = false

# --- Generic hardcoded secrets ---

[[detect.patterns]]
name = "generic_password_assignment"
# password|passwd|pwd|secret|token|api_key = "..."
# Узкий: ловим только присваивания строковых значений длины ≥ 8
regex = '''(?i)(password|passwd|pwd|secret|api[_\-]?key|access[_\-]?token|auth[_\-]?token)\s*[:=]\s*["']([^"'\s]{8,})["']'''
entropy_check = true
min_entropy = 3.5
ignore_case = false  # уже учтено через (?i) внутри regex

[output]
format = "table"        # table | json | csv
group_by = "pattern"    # pattern | file | none
sort_by = "file"        # file | pattern | entropy
limit = 0
max_text = 80
# strict = true → exit 1 при находках (для CI/pre-push)
strict = true
