# inspection_full — Полная инспекция с отбраковкой и записью в БД
#
# Pipeline:
#   camera_0   — CameraServicePlugin (simulator) → BGR-кадры @ 25 fps
#   processor  — ColorMaskPlugin (красные объекты) + BlobDetectorPlugin
#   renderer   — RenderOverlayPlugin (красный overlay + bbox)
#   inspector  — RobotControlPlugin (reject/pass по площади дефекта)
#   storage    — DatabasePlugin (batch INSERT в SQLite)
#   gui        — отображение результата
#
# Запуск:
#   python multiprocess_prototype/run.py multiprocess_prototype/topology/inspection_full.yaml

name: inspection_full
description: "Полная инспекция: камера → маска → детекция → overlay → отбраковка → БД → GUI"

processes:
  # --- Камера: захват кадров через simulator backend ---
  - process_name: camera_0
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: high
    chain_targets:
      - processor
    source_target_fps: 25
    plugins:
      - plugin_class: Plugins.sources.camera_service.plugin.CameraServicePlugin
        plugin_name: camera_service
        category: source
        camera_type: simulator
        camera_id: 0
        resolution_width: 640
        resolution_height: 480
        auto_start: true

  # --- Процессор: детекция красных объектов (дефектов) ---
  - process_name: processor
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - renderer
    plugins:
      # Шаг 1: HSV-маска красного диапазона (H: 0-30, насыщенный цвет)
      - plugin_class: Plugins.processing.color_mask.plugin.ColorMaskPlugin
        plugin_name: color_mask
        category: processing
        h_min: 0
        h_max: 30
        s_min: 100
        s_max: 255
        v_min: 100
        v_max: 255
      # Шаг 2: Детекция контуров — красные контуры, фильтр по площади
      - plugin_class: Plugins.processing.blob_detector.plugin.BlobDetectorPlugin
        plugin_name: blob_detector
        category: processing
        min_area: 200
        max_area: 50000
        draw_contours: true
        contour_color_bgr: [0, 0, 255]

  # --- Рендерер: красный overlay + bounding boxes ---
  - process_name: renderer
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - inspector
    plugins:
      - plugin_class: Plugins.render.render_overlay.plugin.RenderOverlayPlugin
        plugin_name: render_overlay
        category: processing
        mask_alpha: 0.4
        mask_color_b: 0
        mask_color_g: 0
        mask_color_r: 255
        draw_detections: true

  # --- Инспектор: принятие решения reject/pass по размеру дефекта ---
  - process_name: inspector
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - storage
      - gui
    plugins:
      - plugin_class: Plugins.control.robot_control.plugin.RobotControlPlugin
        plugin_name: robot_control
        category: processing
        enabled: true
        min_defect_area: 500

  # --- Хранилище: batch-запись результатов в SQLite ---
  - process_name: storage
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: low
    plugins:
      - plugin_class: Plugins.io.database.plugin.DatabasePlugin
        plugin_name: database
        category: output
        db_path: "data/inspection_results.db"
        batch_size: 50
        flush_interval_sec: 1.0

  # --- GUI: отображение финального кадра с результатами ---
  - process_name: gui
    process_class: multiprocess_prototype.frontend.process.GuiProcess
    plugins: []
