# Camera + GUI — захват с вебкамеры + отображение в Qt окне (Phase 5)
#
# Процессы:
#   camera_0 — produce(): захват кадров → SHM → IPC → gui
#   gui      — PySide6 окно, отображение кадров из SHM
#
# Запуск: python multiprocess_prototype/run.py multiprocess_prototype/topology/camera_gui.yaml
# Затем нажать "Start Capture" в табе Controls.

name: camera_gui
description: "Webcam capture → GUI display (SHM + data pipeline)"

processes:
  - process_name: camera_0
    priority: high
    chain_targets:
      - gui
    source_target_fps: 30
    plugins:
      - plugin_class: Plugins.sources.capture.plugin.CapturePlugin
        plugin_name: capture
        category: source
        camera_id: 0
        device_id: 0
        resolution_width: 640
        resolution_height: 480
        fps: 30

  - process_name: gui
    process_class: multiprocess_prototype.frontend.process.GuiProcess
    plugins: []

wires: []
