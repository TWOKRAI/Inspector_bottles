# hello_world — Минимальная topology для быстрого старта
#
# Pipeline:
#   camera_0  — CameraServicePlugin (simulator, 640x480, 10 fps)
#   gui       — отображение кадров
#
# Запуск:
#   python multiprocess_prototype/run.py multiprocess_prototype/topology/hello_world.yaml

name: hello_world
description: "Минимальный пример: камера-симулятор → GUI"

processes:
  - process_name: camera_0
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - gui
    source_target_fps: 10
    plugins:
      - plugin_class: Plugins.sources.camera_service.plugin.CameraServicePlugin
        plugin_name: camera_service
        category: source
        camera_type: simulator
        camera_id: 0
        resolution_width: 640
        resolution_height: 480
        auto_start: true

  - process_name: gui
    process_class: multiprocess_prototype.frontend.process.GuiProcess
    plugins: []
