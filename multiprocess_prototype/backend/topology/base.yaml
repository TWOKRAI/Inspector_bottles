# base.yaml — ФУНДАМЕНТ (приватная топология, headless-only).
#
# Базовые always-on процессы инфраструктуры, которые есть ВСЕГДА и НЕ участвуют
# в pipeline. Презентация (GUI) здесь БОЛЬШЕ НЕ объявляется (Ф2 frontend-constructor,
# 2026-07) — она вынесена в отдельный презентационный overlay
# ``multiprocess_prototype/frontend/presentation.yaml``.
#
# При запуске фундамент СУММИРУЕТСЯ с активным pipeline (см. launch.merge_topologies):
#   merged.processes = base.processes + pipeline.processes
# Если задан презентационный overlay (``AppManifest.presentation``), он подмешивается
# ПЕРЕД pipeline: merged = base ⊕ presentation ⊕ pipeline (см. SystemBuilder.from_manifest).
#
# Headless по умолчанию: без presentation-overlay бэкенд бутится без окна — просто
# always-on инфра (``devices``) + pipeline. GUI поднимается только через явную точку
# входа ``multiprocess_prototype/frontend/run.py`` (включает presentation-overlay).
#
# Оркестратор (ProcessManagerProcessApp) — процесс-хозяин, добавляется лончером
# отдельно (orchestrator_class_path), здесь не объявляется.

name: base
description: "Фундамент: always-on инфра (headless, без презентации)"

processes:
  - process_name: devices
    protected: true
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    plugins:
      - plugin_class: Plugins.hub.device_hub.plugin.DeviceHubPlugin
        plugin_name: device_hub
        category: hub
        registry_path: data/devices.yaml

wires: []
