# base.yaml — ФУНДАМЕНТ (приватная топология).
#
# Базовые процессы, которые есть ВСЕГДА и НЕ участвуют в pipeline:
#   - презентация (GUI) — объявлена классом, заменяема (PyQt → веб-сервер и т.п.)
#   - (будущее) другие always-on процессы инфраструктуры
#
# При запуске фундамент СУММИРУЕТСЯ с активным pipeline (см. main.merge_topologies):
#   merged.processes = base.processes + pipeline.processes
# Pipeline адресует презентацию по имени процесса (chain_targets: [gui]).
#
# Headless: убрать процесс презентации отсюда (или указать в манифесте другой
# base без GUI) — бэкенд/цепочки работают так же, просто без окна.
#
# Оркестратор (ProcessManagerProcessApp) — процесс-хозяин, добавляется лончером
# отдельно (orchestrator_class_path), здесь не объявляется.

name: base
description: "Фундамент: презентация (GUI) + always-on инфра"

processes:
  - process_name: gui
    protected: true
    process_class: multiprocess_prototype.frontend.process.GuiProcess
    plugins: []

  - process_name: devices
    protected: true
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    plugins:
      - plugin_class: Plugins.hub.device_hub.plugin.DeviceHubPlugin
        plugin_name: device_hub
        category: hub
        registry_path: data/devices.yaml

wires: []
