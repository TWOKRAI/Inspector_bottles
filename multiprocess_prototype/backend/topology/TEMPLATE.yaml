# TEMPLATE — Шаблон для создания новой topology
#
# Инструкция:
#   1. Скопируйте этот файл в topology/<ваше_имя>.yaml
#   2. Замените placeholder-значения на реальные
#   3. Запустите: python multiprocess_prototype/run.py topology/<ваше_имя>.yaml
#
# Документация плагинов: см. Plugins/*/README.md

# --- Метаданные ---
name: my_pipeline              # Уникальное имя topology
description: "Описание системы"  # Человекочитаемое описание

# --- Процессы ---
# Каждый процесс = GenericProcessApp с набором плагинов.
# chain_targets определяет кому процесс отправляет результат.
processes:

  # Источник данных (камера)
  - process_name: camera_0           # Уникальное имя процесса
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: high                    # high | normal | low
    chain_targets:                    # Кому отправлять результат
      - processor
    source_target_fps: 25             # Целевой FPS (только для source-процессов)
    plugins:
      - plugin_class: Plugins.sources.camera_service.plugin.CameraServicePlugin
        plugin_name: camera_service   # Уникальное имя плагина в процессе
        category: source              # source | processing | rendering | control | output | service | utility
        # Параметры плагина (см. plugin config_schema):
        camera_type: simulator        # simulator | opencv | hikvision
        camera_id: 0
        resolution_width: 640
        resolution_height: 480
        auto_start: true

  # Обработка
  - process_name: processor
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - gui
    plugins:
      # Добавьте processing-плагины:
      # - color_mask, grayscale, negative, flip, resize
      # - blob_detector, region_split, stitcher
      # - render_overlay, renderer_compositor
      # Пример:
      - plugin_class: Plugins.processing.grayscale.plugin.GrayscalePlugin
        plugin_name: grayscale
        category: processing

  # GUI (отображение) — НЕ объявляется здесь: процесс `gui` живёт в фундаменте
  # (backend/topology/base.yaml) и суммируется при запуске. Pipeline адресует
  # его по имени через chain_targets: [gui] (см. процесс выше).

# --- Менеджеры (опционально) ---
# Конфигурация FW-менеджеров. Если не указано — используются defaults.
