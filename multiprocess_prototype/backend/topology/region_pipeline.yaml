# Region Pipeline — Camera → Resize → Split → Parallel processing → Stitch → GUI
#
# Демонстрация multi-region pipeline (Phase 5 data pipeline):
#   1. camera_0        — produce() → BGR-кадры
#   2. preprocessor    — process(): ResizePlugin
#   3. region_splitter — process(): 1:N fan-out, item["target"] per-region
#   4. process_negative   — process(): инверсия (регион 0)
#   5. process_grayscale  — process(): grayscale (регион 1)
#   6. process_flip       — process(): переворот (default region)
#   7. stitcher        — process(): fan-in N:1 (InspectorManager буферизует по seq_id)
#   8. gui             — отображение
#
# chain_targets на уровне процесса — куда GenericProcess отправляет результат.
# item["target"] (region_split) — per-item override для fan-out.
#
# Запуск: python multiprocess_prototype/run.py multiprocess_prototype/backend/topology/region_pipeline.yaml

name: region_pipeline
description: "Camera → Resize → Split → Negative/Grayscale/Flip → Stitch → GUI"

processes:
  # --- Камера: захват кадров ---
  - process_name: camera_0
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: high
    chain_targets:
      - preprocessor
    source_target_fps: 25
    plugins:
      - plugin_class: Plugins.sources.capture.plugin.CapturePlugin
        plugin_name: capture
        category: source
        camera_id: 0
        device_id: 0
        resolution_width: 640
        resolution_height: 480
        fps: 25

  # --- Препроцессор: масштабирование ---
  - process_name: preprocessor
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - region_splitter
    plugins:
      - plugin_class: Plugins.processing.resize.plugin.ResizePlugin
        plugin_name: resize
        category: processing
        scale_factor: 1.0
        interpolation: linear

  # --- Нарезка на регионы (1:N fan-out через item["target"]) ---
  - process_name: region_splitter
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    # chain_targets не нужен: region_split ставит item["target"] per-item
    plugins:
      - plugin_class: Plugins.processing.region_split.plugin.RegionSplitPlugin
        plugin_name: region_split
        category: processing
        camera_id: 0
        regions:
          - name: region_0
            x: 0
            y: 0
            width: 320
            height: 240
            target: process_negative
          - name: region_1
            x: 320
            y: 0
            width: 320
            height: 240
            target: process_grayscale
        default_region:
          name: region_default
          target: process_flip

  # --- Обработка: негатив (верхний левый регион) ---
  - process_name: process_negative
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - stitcher
    plugins:
      - plugin_class: Plugins.processing.negative.plugin.NegativePlugin
        plugin_name: negative
        category: processing

  # --- Обработка: чёрно-белое (верхний правый регион) ---
  - process_name: process_grayscale
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - stitcher
    plugins:
      - plugin_class: Plugins.processing.grayscale.plugin.GrayscalePlugin
        plugin_name: grayscale
        category: processing

  # --- Обработка: переворот (полный кадр) ---
  - process_name: process_flip
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - stitcher
    plugins:
      - plugin_class: Plugins.processing.flip.plugin.FlipPlugin
        plugin_name: flip
        category: processing

  # --- Склейка регионов (fan-in N:1, InspectorManager буферизует) ---
  - process_name: stitcher
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - gui
    plugins:
      - plugin_class: Plugins.processing.stitcher.plugin.StitcherPlugin
        plugin_name: stitcher
        category: processing
        camera_id: 0
        expected_regions:
          - region_0
          - region_1
          - region_default

  # --- GUI: отображение ---
  # Процесс `gui` — НЕ здесь: он в фундаменте (backend/topology/base.yaml) и
  # суммируется при запуске. Pipeline адресует его по имени (chain_targets: [gui]).

wires:
  - source: camera_0.capture.frame
    target: preprocessor.resize.frame
    description: "BGR-кадры с камеры → масштабирование"

  - source: preprocessor.resize.frame
    target: region_splitter.region_split.frame
    description: "Масштабированный кадр → нарезка на регионы"

  - source: region_splitter.region_split.region
    target: process_negative.negative.region
    description: "Регион → негатив"

  - source: region_splitter.region_split.region
    target: process_grayscale.grayscale.frame
    description: "Регион → grayscale"

  - source: region_splitter.region_split.region
    target: process_flip.flip.region
    description: "Регион → переворот"

  - source: process_negative.negative.region
    target: stitcher.stitcher.region
    description: "Негатив-регион → склейка"

  - source: process_grayscale.grayscale.frame
    target: stitcher.stitcher.region
    description: "Grayscale-регион → склейка"

  - source: process_flip.flip.region
    target: stitcher.stitcher.region
    description: "Перевёрнутый регион → склейка"

# --- Дисплеи: куда направляется финальный кадр и где показывается ---
# Сток пайплайна — Display-нода «main» (см. backend/config/displays.yaml).
# stitcher.frame (склеенный кадр) → канал main → отрисовка в области «Main».
# В GUI-редакторе это рисуется отдельным Display-боксом на конце графа.
displays:
  - node_id: stitcher.stitcher.frame
    display_id: main
    display_name: Основной дисплей
