# inspection_basic — Базовая инспекция
#
# Pipeline:
#   camera_0    — CameraServicePlugin (simulator) → BGR-кадры @ 25 fps
#   processor   — ColorMaskPlugin (HSV-маска) + BlobDetectorPlugin (контуры)
#   renderer    — RenderOverlayPlugin (alpha blending маски + bbox)
#   gui         — отображение результата
#
# Запуск:
#   python multiprocess_prototype/run.py multiprocess_prototype/backend/topology/inspection_basic.yaml

name: inspection_basic
description: "Базовая инспекция: камера → HSV-маска → детекция → overlay → GUI"

processes:
  # --- Камера: захват кадров через simulator backend ---
  - process_name: camera_0
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: high
    chain_targets:
      - processor
    source_target_fps: 25
    plugins:
      - plugin_class: Plugins.sources.camera_service.plugin.CameraServicePlugin
        plugin_name: camera_service
        category: source
        camera_type: simulator
        camera_id: 0
        resolution_width: 640
        resolution_height: 480
        auto_start: true

  # --- Процессор: HSV-маска + детекция контуров ---
  - process_name: processor
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - renderer
    plugins:
      # Шаг 1: HSV-фильтрация (весь диапазон — принимает всё)
      - plugin_class: Plugins.processing.color_mask.plugin.ColorMaskPlugin
        plugin_name: color_mask
        category: processing
        h_min: 0
        h_max: 180
        s_min: 50
        s_max: 255
        v_min: 50
        v_max: 255
      # Шаг 2: Детекция контуров по маске
      - plugin_class: Plugins.processing.blob_detector.plugin.BlobDetectorPlugin
        plugin_name: blob_detector
        category: processing
        min_area: 100
        max_area: 0
        draw_contours: true

  # --- Рендерер: наложение маски и bbox на кадр ---
  - process_name: renderer
    process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
    priority: normal
    chain_targets:
      - gui
    plugins:
      - plugin_class: Plugins.render.render_overlay.plugin.RenderOverlayPlugin
        plugin_name: render_overlay
        category: processing
        mask_alpha: 0.5
        draw_detections: true

  # --- GUI: отображение финального кадра ---
  - process_name: gui
    process_class: multiprocess_prototype.frontend.process.GuiProcess
    plugins: []
