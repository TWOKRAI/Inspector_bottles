# Phase 3/5: Full Pipeline — Camera → Processing → Output (fan-out)
#
# Демонстрация: source → processing → output chain.
# chain_targets на уровне процесса для routing.
#
# Процессы:
#   camera_0    — produce(): захват кадров
#   processor_0 — process(): grayscale
#   output_0    — process(): database + frame_saver (fan-out output)

name: phase3_pipeline
description: "Camera → Grayscale → Database + FrameSaver (fan-out output)"

processes:
  # --- Камера: захват кадров ---
  - process_name: camera_0
    priority: high
    chain_targets:
      - processor_0
    source_target_fps: 25
    plugins:
      - plugin_class: Plugins.sources.capture.plugin.CapturePlugin
        plugin_name: capture
        category: source
        camera_id: 0
        device_id: 0

  # --- Процессор: grayscale ---
  - process_name: processor_0
    priority: normal
    chain_targets:
      - output_0
    plugins:
      - plugin_class: Plugins.processing.grayscale.plugin.GrayscalePlugin
        plugin_name: grayscale
        category: processing

  # --- Output: database + frame_saver (в одном процессе) ---
  - process_name: output_0
    priority: normal
    plugins:
      - plugin_class: Plugins.io.database.plugin.DatabasePlugin
        plugin_name: database
        category: output
        db_path: data/inspector.db
        batch_size: 50
        flush_interval_sec: 2.0

      - plugin_class: Plugins.io.frame_saver.plugin.FrameSaverPlugin
        plugin_name: frame_saver
        category: output
        camera_id: 0
        output_dir: data/frames
        save_every_n: 25
        image_format: jpeg
        jpeg_quality: 85

wires:
  - source: camera_0.capture.frame
    target: processor_0.grayscale.frame
    description: "BGR-кадры с камеры → grayscale"

  - source: processor_0.grayscale.frame
    target: output_0.frame_saver.frame
    description: "Обработанные кадры → сохранение на диск"

  - source: processor_0.grayscale.frame
    target: output_0.database.result
    description: "Метаданные обработки → запись в БД"
