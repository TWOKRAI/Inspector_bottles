# Inspector Bottles v2 — системные defaults
# Topology JSON (topology/*.json) описывает СТРУКТУРУ (процессы, плагины, wires).
# Этот файл описывает ЗНАЧЕНИЯ по умолчанию для всех плагинов.
# Плагин в topology может override любое поле — здесь только базовые defaults.

# --- Системные параметры ---
system:
  stop_timeout: 5.0           # таймаут graceful shutdown (сек)
  shm_budget_mb: 512          # лимит общей SHM-памяти
  log_dir: "logs/prototype_2"  # относительно cwd, каждый процесс → подпапка

# --- Камеры (defaults для capture-плагинов) ---
camera:
  source_type: simulator      # simulator | webcam | hikvision | file
  fps: 25
  resolution_width: 640
  resolution_height: 480
  ring_buffer_size: 3

# --- Обработка ---
processing:
  worker_pool_size: 0         # 0 = пул отключён

# --- Дисплей ---
display:
  enabled: true

# --- Хранение ---
storage:
  db_path: data/inspector.db
  batch_size: 100

# --- Backend-control сокет (dev-инструмент: BackendDriver / MCP) ---
# enabled: true → ProcessManager поднимает TCP-endpoint на host:port (localhost).
# Через него headless-driver шлёт те же router-команды, что GUI (отладка бэкенда
# без GUI/qt-mcp). В проде ставить false. Env BACKEND_CTL=1 включает независимо.
backend_ctl:
  enabled: true
  port: 8765
  host: "127.0.0.1"

# --- Наблюдаемость (единая секция: Logger + Error + Stats) ---
# Управляет всеми тремя менеджерами наблюдаемости каждого процесса (overlay поверх
# дефолтов фреймворка). Правка этой секции — точка для hot-reload (Phase 3.3).
# log_directory не задан → используется system.log_dir выше.
observability:
  log_level: INFO          # DEBUG | INFO | WARNING | ERROR | CRITICAL
  enable_batching: true    # батчинг записи (Logger + Error)
  console: true            # консольный sink
  file: true               # файловые sink-каналы
  errors:
    enabled: true
    level: WARNING
    include_stacktrace: true
  stats:
    enabled: true
    aggregation_interval: 5.0
    log_level: INFO

# --- Телеметрия (PC 1.3/2.1, план plans/telemetry-publish-control.md) ---
# Две независимые плоскости, обе ПО УМОЛЧАНИЮ отключены (обратная совместимость —
# нет секции/подсекции → поведение как раньше). Errors/status — публикуются ВСЕГДА,
# этой секцией не управляются.
#
# publish — publisher-gate (Фаза 1, ГЛАВНЫЙ рычаг): какие метрики процесс СЧИТАЕТ
# и публикует в дерево StateStore и как часто (per-метрика вкл/выкл + интервал).
# Раскомментируйте, чтобы включить управляемую публикацию для ВСЕХ процессов;
# per-process override — в blueprint.processes[].telemetry конкретного рецепта
# (мержится поверх этих значений).
#
# throttle — центральный store-троттл (Фаза 2, IPC-страховка вторым рубежом):
# {glob_pattern: min_interval_sec} для ThrottleMiddleware StateStoreManager.
# Заданный (непустой) throttle ПОЛНОСТЬЮ ЗАМЕНЯЕТ хардкод-дефолты
# build_throttle_rules (не мержится поверх них) — раскомментировав, владелец берёт
# на себя весь список правил. Пусто/отсутствует → прежние хардкод-дефолты.
# telemetry:
#   publish:
#     default_interval_sec: 1.0          # дефолтная частота публикации метрики, сек
#     metrics:
#       fps:               {enabled: true,  interval_sec: 1.0}
#       latency_ms:        {enabled: true,  interval_sec: 1.0}
#       effective_hz:      {enabled: true,  interval_sec: 1.0}
#       cycle_duration_ms: {enabled: false}                      # тяжёлая метрика — opt-in
#       shm:               {enabled: true,  interval_sec: 5.0}
#   throttle:
#     # строгий потолок: поднятие частоты через publisher выше него всплывёт как
#     # `capped_by_throttle` в результате команды, троттл не срежет тихо (ADR-PM-017)
#     "processes.**.state.fps": 1.0
#     "processes.**.state.latency_ms": 1.0
#     "processes.**.workers.*.effective_hz": 1.0

# --- Автообнаружение плагинов и сервисов ---
discovery:
  plugin_paths:
    - "Plugins"
    - "Services"   # плагины внутри Service-пакетов (напр. Services/modbus/plugin/plugin.py)
  service_paths:
    - "Services"
  auto_discover: true
