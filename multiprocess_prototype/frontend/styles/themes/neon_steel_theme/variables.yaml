# Переменные темы neon_steel_theme (Neon Steel)
# Drop-in замена для innotech_theme/variables.yaml — те же ключи, новые значения.
# Отличия от Silver Industrial:
#   - шире тональный диапазон градиентов (светлее верх, темнее низ) → больше объёма
#   - глубже чёрные тени (shadow_*), ярче белые блики (glow_*)
#   - больше неона: усилены accent_glass_*, ярче accent_hi, неоновый скроллбар
#   - шрифты: UI — Exo 2, моно — JetBrains Mono; логотип — Square721 BdEx BT (см. THEME_SPEC)

