# Inspector Bottles — главный конфиг (манифест).
# Единственный файл, который читает точка входа (main). Пути — от этого каталога.
# Подробности: plans/config-driven-launch.md

# Имя приложения (Ф5.11): app_module читает его в generic-контуре run_app.
name: Inspector Bottles

# Версия схемы манифеста (задел движка миграций, Ф5.11).
version: 1

# Системные настройки + defaults для плагинов
system: backend/config/system.yaml

# Стили: каталог тем (стилевых рецептов) + активная тема
styles:
  dir: frontend/styles/themes
  active: neon_steel_theme

# Фундамент (приватная топология): презентация + always-on. Суммируется с pipeline.
base: backend/topology/base.yaml

# Активный запускаемый pipeline. Это РЕЦЕПТ (GUI-редактируемый): загрузчик
# разворачивает его blueprint: → топология → оркестратор собирает. Модель владельца:
# GUI формирует рецепт-файл, бэкенд запускает его (и без GUI). Сырые topology в
# backend/topology/ остаются для прочих pipeline.
# Активен color_inspect (камера → HSV-маска → контуры/площадь → рисование линии на
# дисплей + универсальный Modbus-пакет). Переключить на другой рецепт — во вкладке
# Recipes или сменой этой строки (region_pipeline / modbus_demo / color_inspect).
pipeline: recipes/region_pipeline.yaml

# Каталог GUI-редактируемых рецептов (источник запускаемых топологий)
recipes: recipes
