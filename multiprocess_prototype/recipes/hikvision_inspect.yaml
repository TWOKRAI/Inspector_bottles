# Рецепт hikvision_inspect — промышленная камера Hikvision → дисплей.
#
# Цепочка:
#   camera_0 [HikvisionCameraPlugin] → color_convert [BGR↔RGB] → gui (display "main")
#
# Нода color_convert переставляет каналы R/B: Bayer-демозаик камеры даёт
# RGB-порядок, дисплей настроен на BGR — нода приводит к корректным цветам.
#
# МНОГО КАМЕР (независимы, каждая в СВОЁМ процессе):
#   Скопируй блоки camera_0 + (опц.) свой color_convert, поменяй:
#     - process_name: camera_1
#     - camera_id: 1            (уникальный SHM-слот hikvision_{id}_frame)
#     - camera_index: 1         (индекс устройства в enum_devices)
#   Добавь wire camera_1 → своя нода → gui и привязку display.
#
# Предусловие: установлен MVS SDK (MvCameraControl.dll), камера(ы) подключены.
# Запуск: python run.py → вкладка «Рецепты» → выбрать hikvision_inspect → активировать.
name: hikvision_inspect
version: 3
description: "Hikvision камера → BGR↔RGB нода → дисплей (multi-camera-ready)"

blueprint:
  name: hikvision_inspect
  description: "Промышленная камера Hikvision → нода конвертации цвета → дисплей"

  # free-layout: позиции нод графа (node_id → [x, y]) для чистой загрузки без
  # «Раскладки». Авто-сохраняется при перетаскивании (PipelinePresenter).
  metadata:
    gui_positions:
      camera_0.hikvision: [60, 120]
      color_convert.color_convert: [340, 120]
      main: [620, 120]
    locked_nodes: []

  processes:
    # --- Камера 0 (один процесс на одну камеру) ---
    - process_name: camera_0
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: high
      chain_targets:
        - color_convert
      source_target_fps: 25
      plugins:
        - plugin_class: Services.hikvision_camera.plugin.plugin.HikvisionCameraPlugin
          plugin_name: hikvision
          category: source
          camera_id: 0
          camera_index: 0
          resolution_width: 1920
          resolution_height: 1080
          fps: 25
          auto_start: true

    # --- Нода конвертации цвета BGR↔RGB ---
    - process_name: color_convert
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      chain_targets:
        - gui
      plugins:
        - plugin_class: Plugins.processing.color_convert.plugin.ColorConvertPlugin
          plugin_name: color_convert
          category: processing
          mode: bgr2rgb

  wires:
    - source: camera_0.hikvision.frame
      target: color_convert.color_convert.frame

  # Привязка узла к дисплею (node_id = process.plugin.port)
  displays:
    - node_id: color_convert.color_convert.frame
      display_id: main

# Определения дисплеев (top-level)
displays:
  - id: main
    name: Камера 0
    width: 1280
    height: 720
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 0
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
