# Рецепт robot_demo v4 — камера + тонкий robot_io (job-форвардер в devices).
#
# Архитектура: процесс devices (always-on, base.yaml) владеет соединениями
# с роботом и ПЧ. Плагин robot_io только форвардит job-координаты из pipeline
# в devices через IPC (DeviceHubClient).
#
# Управление — со вкладки Services -> «Робот Delta» / «ПЧ» (IPC в devices).
#
# Запуск без железа (симулятор робота — в ОТДЕЛЬНОМ терминале, ПЕРВЫМ):
#   1) python -m Services.robot_comm.server          # sim: 127.0.0.1:5021, unit 2
#   2) В секции devices ниже: поменять host/port устройства robot_main
#      на 127.0.0.1 / 5021
#   3) python multiprocess_prototype/run.py recipes/robot_demo.yaml
#
# С железом: host 192.168.1.7, port 502 (дефолты ниже).
# Предусловие: pip install '.[modbus]' (pymodbus).
name: robot_demo
version: 4
description: "Camera + тонкий robot_io (job-форвард в devices hub)"

# Устройства рецепта — upsert в реестр devices при активации (Р11).
# Формат DeviceEntry: id, kind, protocol, transport, params.
devices:
  - id: robot_main
    name: "Робот Delta"
    kind: robot
    protocol: delta_universal3
    transport: {type: tcp, host: 192.168.1.7, port: 502, unit_id: 2}
    params: {word_order: little, feed_poll_s: 0.05, telemetry_interval_s: 0.5}
  - id: vfd_belt
    name: "ПЧ лента"
    kind: vfd
    protocol: gd20_bridge
    transport: {type: bridge, bridge: robot_main}
    params: {freq_max_hz: 50.0, default_freq_hz: 10.0, poll_interval_s: 0.5, stale_polls_limit: 6}

blueprint:
  name: robot_demo
  description: "Робот Delta: тонкий job-форвардер в devices hub"

  processes:
    # --- Камера: захват кадров (превью в дисплей) ---
    - process_name: camera_0
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: high
      chain_targets:
        - gui
        - robot
      source_target_fps: 25
      plugins:
        - plugin_class: Plugins.sources.capture.plugin.CapturePlugin
          plugin_name: capture
          category: source
          camera_id: 0
          device_id: 0
          resolution_width: 640
          resolution_height: 480
          fps: 25
          auto_start: true

    # --- Тонкий robot_io: job-форвардер в devices ---
    - process_name: robot
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      chain_targets: []
      plugins:
        - plugin_class: Plugins.io.robot_io.plugin.RobotIoPlugin
          plugin_name: robot_io
          category: io
          device_id: robot_main

  wires:
    # Кадры в ноду робота: item с ключом robot_job ({x_mm, y_mm}) попадёт в
    # forward-deque (upstream-детектор/калибровка добавится позже).
    - source: camera_0.capture.frame
      target: robot.robot_io.robot_job

  displays:
    - node_id: camera_0.capture.frame
      display_id: main

displays:
  - id: main
    name: Основной дисплей
    width: 1280
    height: 720
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 0
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
