# Рецепт robot_demo — нода робота Delta (CVT + рисование + ПЧ) + камера.
#
# ТОПОЛОГИЧЕСКОЕ ТРЕБОВАНИЕ: robot_io (владелец соединения), vfd_control и
# robot_draw обязаны жить в ОДНОМ процессе — клиент робота публикуется в
# process-local runtime (Services.robot_comm.runtime) и через границу
# процессов не виден.
#
# Управление — со вкладки Services -> «Робот Delta» (тест-job, стопы,
# CVT/DRAW, рисование, ПЧ) или CLI: python -m Services.robot_comm pos.
#
# Запуск без железа (симулятор робота — в ОТДЕЛЬНОМ терминале, ПЕРВЫМ):
#   1) python -m Services.robot_comm.server          # sim: 127.0.0.1:5021
#   2) поменять host/port ниже на 127.0.0.1/5021
#   3) python multiprocess_prototype/run.py recipes/robot_demo.yaml
#
# С железом: host 192.168.1.7, port 502 (дефолты ниже).
# Предусловие: pip install '.[modbus]' (pymodbus).
name: robot_demo
version: 3
description: "Camera → GUI + нода робота Delta (robot_io + vfd_control + robot_draw)"

blueprint:
  name: robot_demo
  description: "Робот Delta: CVT pick-place, рисование, ПЧ (лента) через RS-485-мост"

  processes:
    # --- Камера: захват кадров (превью в дисплей) ---
    - process_name: camera_0
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: high
      chain_targets:
        - gui
        - robot
      source_target_fps: 25
      plugins:
        - plugin_class: Plugins.sources.capture.plugin.CapturePlugin
          plugin_name: capture
          category: source
          camera_id: 0
          device_id: 0
          resolution_width: 640
          resolution_height: 480
          fps: 25
          auto_start: true

    # --- Нода робота: владелец соединения + потребители (co-location!) ---
    - process_name: robot
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      chain_targets: []
      plugins:
        # Владелец RobotClient: создаёт/коннектит/публикует в runtime, feeder CVT
        - plugin_class: Plugins.io.robot_io.plugin.RobotIoPlugin
          plugin_name: robot_io
          category: io
          host: 192.168.1.7
          port: 502
          unit_id: 2
          word_order: little
          auto_connect: true
        # ПЧ (лента) через RS-485-мост робота — клиента берёт из runtime
        - plugin_class: Plugins.control.vfd_control.plugin.VfdControlPlugin
          plugin_name: vfd_control
          category: control
          freq_max_hz: 50.0
          default_freq_hz: 10.0
          poll_interval_s: 0.5
        # Рисование фигур — клиента берёт из runtime, исполняет асинхронно
        - plugin_class: Plugins.control.robot_draw.plugin.RobotDrawPlugin
          plugin_name: robot_draw
          category: control
          pen_down_mm: 0.0
          pen_up_mm: 10.0
          draw_speed_pct: 30
          auto_draw: false

  wires:
    # Кадры в ноду робота: item с ключом robot_job ({x_mm, y_mm}) попадёт в
    # очередь feeder (upstream-детектор/калибровка добавится позже).
    - source: camera_0.capture.frame
      target: robot.robot_io.robot_job

  displays:
    - node_id: camera_0.capture.frame
      display_id: main

displays:
  - id: main
    name: Основной дисплей
    width: 1280
    height: 720
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 0
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
