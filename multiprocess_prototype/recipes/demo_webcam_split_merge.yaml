active_services:
- webcam_camera
blueprint:
  description: Demo рецепт Phase 7b — split/merge pipeline
  name: demo_webcam_split_merge
  processes:
  - plugins:
    - plugin_name: capture
    - plugin_name: resize
    - plugin_name: region_split
    process_name: capture_proc
  - plugins:
    - plugin_name: grayscale
    - plugin_name: color_mask
    process_name: roi_a_proc
  - plugins:
    - plugin_name: negative
    - plugin_name: blur
    process_name: roi_b_proc
  - plugins:
    - plugin_name: stitcher
    - plugin_name: render_overlay
    process_name: merge_proc
  wires:
  - source: capture_proc.region_split.region
    target: roi_a_proc.grayscale.frame
  - source: capture_proc.region_split.region
    target: roi_b_proc.negative.frame
  - source: roi_a_proc.color_mask.frame
    target: merge_proc.stitcher.region
  - source: roi_b_proc.blur.frame
    target: merge_proc.stitcher.region
