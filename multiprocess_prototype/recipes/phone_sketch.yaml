# Рецепт phone_sketch — как webcam_sketch, но источник кадров — ТЕЛЕФОН.
#
# Тракт (линейный pipeline, 4 процесса — каждый питает свой дисплей):
#   camera_0[phone_camera] → seg[segmentation] → lines[edge_detection→blob_filter→strokes_to_points]
#                                               → points[points_render→robot_draw]
#
# Дисплеи (маршрутизация по процессу-отправителю):
#   seg    → «Оригинал»  (фото с телефона после сегментации/коррекции)
#   lines  → «Line-art»  (TEED-линии)
#   points → «Карта точек» (точки + путь робота)
#
# Источник — нода phone_camera (вместо вебкамеры):
#   1) запусти рецепт, открой Services → Телефон — там адрес и QR (включи сервер);
#   2) на телефоне (та же сеть WiFi) открой адрес → отправь фото;
#   3) фото пойдёт через seg → TEED → точки → робот.
#
# === Сегментация (человек на белом) требует mediapipe ===
#   uv pip install mediapipe   (модель selfie_segmenter.tflite уже в ~/.cache/sketch_robot)
#   Без mediapipe плагин seg пропускает кадр (фон не убирается) — остальное работает.
#
# === Запуск ===
#   Без железа: python -m Services.robot_comm.server (sim 127.0.0.1:5021, unit 2),
#   затем в devices ниже host/port → 127.0.0.1/5021.
#   python multiprocess_prototype/run.py phone_sketch
name: phone_sketch
version: 1
description: "Портрет с телефона → сегментация → TEED → точки → рисование роботом"

devices:
  - id: robot_main
    name: Робот Delta
    kind: robot
    protocol: delta_universal3
    transport:
      type: tcp
      host: 192.168.1.7
      port: 502
      unit_id: 2
    params:
      word_order: little
      feed_poll_s: 0.05
      telemetry_interval_s: 0.5
blueprint:
  name: default
  description: ''
  processes:
    - process_name: gui
      plugins: []
      workers: []
      process_class: multiprocess_prototype.frontend.process.GuiProcess
      priority:
      target_process:
      chain_targets: []
      description:
      protected: true
      category:
      metadata: {}
    - process_name: devices
      plugins:
        - plugin_name: device_hub
          plugin_class: Plugins.hub.device_hub.plugin.DeviceHubPlugin
          category: hub
          config:
            registry_path: data/devices.yaml
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority:
      target_process:
      chain_targets: []
      description:
      protected: true
      category:
      metadata: {}
    - process_name: camera_0
      plugins:
        - plugin_name: phone_camera
          plugin_class: Services.phone_gateway.plugin.plugin.PhoneCameraPlugin
          category: source
          config:
            camera_id: 0
            host: 0.0.0.0
            http_port: 8080
            resolution_width: 640
            resolution_height: 480
            auto_start: true
            show_hint: true
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: high
      target_process:
      chain_targets:
        - seg
      description:
      protected: false
      category:
      metadata:
        source_target_fps: 15
    - process_name: seg
      plugins:
        - plugin_name: segmentation
          plugin_class: Plugins.processing.segmentation.plugin.SegmentationPlugin
          category: processing
          config:
            threshold: 0.5
            bg_white: true
        - plugin_name: image_adjust
          plugin_class: Plugins.processing.image_adjust.plugin.ImageAdjustPlugin
          category: processing
          config:
            brightness: 0.0
            contrast: 1.2
            saturation: 1.0
            gamma: 1.0
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - lines
        - gui
      description:
      protected: false
      category:
      metadata: {}
    - process_name: lines
      plugins:
        - plugin_name: edge_detection
          plugin_class: Plugins.processing.edge_detection.plugin.EdgeDetectionPlugin
          category: processing
          config:
            method: teed
            invert: false
            threshold: 0.5
            device: cuda
            inference_every_n: 1
        - plugin_name: blob_filter
          plugin_class: Plugins.processing.blob_filter.plugin.BlobFilterPlugin
          category: processing
          config:
            min_area: 10
            max_area: 0
        - plugin_name: strokes_to_points
          plugin_class: Plugins.processing.strokes_to_points.plugin.StrokesToPointsPlugin
          category: processing
          config:
            centerline: true
            reduce_mode: dp
            simplify_epsilon: 1.5
            step_px: 5.0
            angle_threshold_deg: 15.0
            min_stroke_len: 8.0
            max_stroke_len: 0.0
            scale_x: 0.3
            scale_y: 0.3
            offset_x: 0.0
            offset_y: 0.0
            flip_y: true
            max_points: 0
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - points
        - gui
      description:
      protected: false
      category:
      metadata: {}
    - process_name: points
      plugins:
        - plugin_name: points_render
          plugin_class: Plugins.processing.points_render.plugin.PointsRenderPlugin
          category: processing
          config:
            canvas_width: 640
            canvas_height: 480
            bg_white: true
            dot_radius: 2
            show_travel: true
        - plugin_name: robot_draw
          plugin_class: Plugins.io.robot_draw.plugin.RobotDrawPlugin
          category: io
          config:
            device_id: robot_main
            # Pipeline-триггер: сигнал пульта (порт out_1) взводит рисование.
            trigger_source: out_1
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - gui
      description:
      protected: false
      category:
      metadata: {}
    - process_name: pult
      plugins:
        - plugin_name: control_panel
          plugin_class: Services.control_panel.plugin.plugin.ControlPanelPlugin
          category: source
          config:
            panel_id: pult
            controls:
              - {id: draw, type: button, label: "Рисовать", port: out_1, trigger_value: true}
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - points
      description:
      protected: false
      category:
      metadata: {}
  wires:
    - source: camera_0.phone_camera.frame
      target: seg.segmentation.frame
      description: ''
    - source: seg.image_adjust.frame
      target: lines.edge_detection.frame
      description: ''
    - source: lines.strokes_to_points.draw_points
      target: points.points_render.draw_points
      description: ''
    - source: pult.control_panel.out_1
      target: points.robot_draw.trigger
      description: 'Кнопка «Рисовать» → взводит отправку точек роботу'
  displays:
    - node_id: seg.image_adjust.frame
      display_id: orig
    - node_id: lines.strokes_to_points.frame
      display_id: lineart
    - node_id: points.points_render.frame
      display_id: points
  metadata:
    gui_positions: &id001
      camera_0.phone_camera:
        - 20.0
        - 40.0
      seg.segmentation:
        - 280.0
        - 40.0
      seg.image_adjust:
        - 504.32188856132063
        - 34.42908225235851
      lines.edge_detection:
        - 897.8468222287737
        - 234.94640315448112
      lines.blob_filter:
        - 1132.8507054834909
        - 232.0459840801887
      lines.strokes_to_points:
        - 1359.8430927181607
        - 247.83905571933974
      points.points_render:
        - 1853.9091021252204
        - 441.6705762732164
      points.robot_draw:
        - 2203.478908529772
        - 427.2295864605817
      pult.control_panel:
        - 1853.0
        - 700.0
      orig:
        - 902.22619089033
        - 39.540159198113315
      lineart:
        - 1687.4778668035083
        - 241.79557581515348
      points:
        - 2214.038629355584
        - 188.1804407673023
    locked_nodes: []

displays:
  - id: orig
    name: Оригинал (фото с телефона)
    width: 640
    height: 480
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 0
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
  - id: lineart
    name: Line-art (TEED)
    width: 640
    height: 480
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 640
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
  - id: points
    name: Карта точек робота
    width: 640
    height: 480
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 1280
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
gui_positions: *id001
