# Рецепт hikvision_letter_robot — БОЕВОЙ тракт робота-укладчика на ПРОМ-камере.
#
#   camera_0 → vision(свап→ROI→маска→морфо→круги) ─┬→ line(триггер)
#                                                  ├→ recog(crop→калибровка→нейронка) → layout(раскладка→робот)
#                                                  ├→ draw(круги+overlay)               (укладка слова)
#                                                  └→ maskview
#
# Слово задаётся с телефона (phone.signal_2). Цикл:
#   1) УКЛАДКА: диск едет по ленте → распознаётся буква+угол → робот берёт диск с ленты
#      (pick = калибровка px→мм) и кладёт в слот слова (place + доворот).
#   2) ВОЗВРАТ: по сигналу с телефона (phone.signal_1) робот возвращает ВСЕ выложенные буквы
#      на ленту (mode=3 RETURN: забор из слота → +Z → +X → −Z → отпустить), затем раскладка
#      сбрасывается — можно вводить новое слово.
#
# === ГРУППИРОВКА ПРОЦЕССОВ (эффективность) ===
#   Плагины внутри процесса идут ЛИНЕЙНОЙ цепочкой — кадр живёт в памяти процесса без
#   межпроцессных SHM-перегонов. Поэтому линейные соседи слиты:
#     vision = color_convert→roi_crop→hsv_mask→morphology→circle_detector (вся предобработка+детекция)
#     recog  = center_crop→pixel_to_robot→ml_inference (кроп→калибровка→нейронка)
#     layout = word_layout→robot_io (раскладка→форвард роботу)
#   Ветвления (vision раздаёт в 4 стороны) и источники (camera/phone) — отдельными процессами.
#   line отдельно: line_filter заменяет item (теряет кадр) — слить в линейную цепочку нельзя.
#
# === ЦВЕТ ===
#   Hikvision отдаёт RGB → color_convert свопает в физ. BGR → весь тракт + ml_inference
#   (sidecar color:RGB, сам делает BGR→RGB) в BGR-конвенции. circle_detector по grayscale.
#
# === КАЛИБРОВКА / КООРДИНАТЫ (важно!) ===
#   pixel_to_robot грузит config/calibration/cam0.yaml (гомография px→мм робота, артефакт
#   визарда camera_robot_calibration) и переводит центр сработавшего круга (sidecar.center_px)
#   → pick_xy (позиция забора с ленты). Энкодер для CVT-трекинга драйвер читает один раз на
#   задание в enqueue_job (девайс-сторона, только когда робот подключён — без частого Modbus).
#   ⚠ ROI калибровки ОБЯЗАН совпадать с боевым (560,240,800,600) — гомография ROI-локальна.
#   Нет cam0.yaml → pick_xy не выдаётся → word_layout(require_pick=True) диск не берёт (видно
#   по застрявшей раскладке — прод-безопасно).
#
# === БЕЛАЯ МАСКА ===
#   hsv_mask(белый: s_max мал, v_min велик) → morphology(чистка) → circle_detector(input_key=mask).
#   Hough по чистой маске не ловит ложных кругов на металле ленты. Дисплей "mask" — для тюнинга.
#
# === ТЮНИНГ (всё в ПИКСЕЛЯХ ROI) ===
#   roi_crop x/y/w/h (синхронно с калибровкой) · hsv_mask s_max/v_min · circle_detector min/max_radius/param2
#   · line_filter center_x/angle(90=вертикаль)/zone_width · center_crop size_mode=radius/output_size=128
#   · ml_inference model/confidence · word_layout first_x/y + line_angle + pitch + place_z + доворот.
#
# Предусловие: MVS SDK (MvCameraControl.dll) + камера; робот 192.168.1.7:502 unit2 + лента (ПЧ).
# Запуск: python multiprocess_prototype/run.py hikvision_letter_robot
name: hikvision_letter_robot
version: 3
description: "Hikvision → круги → линия → crop → калибровка → нейронка → укладка слова роботом"

# Устройства — upsert в реестр devices при активации. Лента управляется через сервис ПЧ
# (vfd_belt — мост поверх robot_main; команды vfd_run/vfd_set_freq/vfd_stop).
devices:
  - id: robot_main
    name: Робот Delta
    kind: robot
    protocol: delta_universal3
    transport:
      type: tcp
      host: 192.168.1.7
      port: 502
      unit_id: 2
    params:
      word_order: little
      feed_poll_s: 0.05
      telemetry_interval_s: 0.5
  - id: vfd_belt
    name: ПЧ лента
    kind: vfd
    protocol: gd20_bridge
    transport:
      type: bridge
      bridge: robot_main
    params:
      freq_max_hz: 50.0
      default_freq_hz: 10.0
      poll_interval_s: 0.5
      stale_polls_limit: 6
blueprint:
  processes:
    - process_name: gui
      plugins: []
      workers: []
      process_class: multiprocess_prototype.frontend.process.GuiProcess
      priority:
      target_process:
      chain_targets: []
      description:
      protected: true
      category:
      metadata: {}
    - process_name: devices
      plugins:
        - plugin_name: device_hub
          plugin_class: Plugins.hub.device_hub.plugin.DeviceHubPlugin
          category: hub
          config:
            registry_path: data/devices.yaml
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority:
      target_process:
      chain_targets: []
      description:
      protected: true
      category:
      metadata: {}
    - process_name: camera_0
      plugins:
        - plugin_name: hikvision
          plugin_class: Services.hikvision_camera.plugin.plugin.HikvisionCameraPlugin
          category: source
          config:
            camera_id: 0
            camera_index: 0
            resolution_width: 1440
            resolution_height: 1080
            fps: 25
            auto_start: true
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: high
      target_process:
      chain_targets:
        - vision
      description:
      protected: false
      category:
      metadata:
        source_target_fps: 25
    - process_name: vision
      plugins:
        - plugin_name: color_convert
          plugin_class: Plugins.processing.color_convert.plugin.ColorConvertPlugin
          category: processing
          config:
            mode: bgr2rgb
        - plugin_name: roi_crop
          plugin_class: Plugins.processing.roi_crop.plugin.RoiCropPlugin
          category: processing
          config:
            x: 367
            y: 297
            width: 800
            height: 481
        - plugin_name: hsv_mask
          plugin_class: Plugins.processing.hsv_mask.plugin.HsvMaskPlugin
          category: processing
          config:
            h_min: 0
            h_max: 179
            s_min: 0
            s_max: 60
            v_min: 190
            v_max: 255
        - plugin_name: morphology
          plugin_class: Plugins.processing.morphology.plugin.MorphologyPlugin
          category: processing
          config:
            operation: open_close
            kernel_shape: ellipse
            kernel_size: 5
            iterations: 1
        - plugin_name: circle_detector
          plugin_class: Plugins.processing.circle_detector.plugin.CircleDetectorPlugin
          category: processing
          config:
            input_key: mask
            keep_mask: true
            mode: gradient
            blur_method: gaussian
            blur_ksize: 5
            dp: 1.4
            min_dist: 200
            param1: 100
            param2: 40.0
            min_radius: 90
            max_radius: 230
            draw_circles: false
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - line
        - recog
        - draw
        - maskview
      description: свап→ROI→маска→морфо→круги (линейно, без межпроцессных SHM-перегонов)
      protected: false
      category:
      metadata: {}
    - process_name: line
      plugins:
        - plugin_name: line_filter
          plugin_class: Plugins.filter.line_filter.plugin.LineFilterPlugin
          category: filter
          config:
            center_x: 376
            center_y: 262
            angle: 90
            zone_width: 250
            mode: zone_edge
            rearm_frames: 2
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - recog
        - draw
      description:
      protected: false
      category:
      metadata: {}
    - process_name: recog
      plugins:
        - plugin_name: center_crop
          plugin_class: Plugins.processing.center_crop.plugin.CenterCropPlugin
          category: processing
          config:
            size_mode: radius
            radius_scale: 1.0
            margin_px: 14
            side_px: 256
            output_size: 128
            drop_partial: false
            pad_if_oob: true
        - plugin_name: pixel_to_robot
          plugin_class: Plugins.processing.pixel_to_robot.plugin.PixelToRobotPlugin
          category: processing
          config:
            camera_id: cam0
            calibration_dir: config/calibration
            center_key: center_px
            output_key: pick_xy
            roi_offset_x: 0
            roi_offset_y: 0
        - plugin_name: ml_inference
          plugin_class: Services.ml_inference.plugin.plugin.MLInferencePlugin
          category: processing
          config:
            model: mobilenet_v3_large_20260616_050828
            device: cpu
            confidence_threshold: 0.5
            top_k: 3
            inference_every_n: 1
            draw_overlay: true
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - gui
        - layout
      description: crop(по триггеру линии) → калибровка px→мм (+энкодер) → нейронка буква+угол
      protected: false
      category:
      metadata:
        inspector:
          mode: join
          inputs:
            - frame
            - overlay
          primary: frame
          timeout_sec: 0.25
    - process_name: layout
      plugins:
        - plugin_name: word_layout
          plugin_class: Plugins.processing.word_layout.plugin.WordLayoutPlugin
          category: processing
          config:
            target_word: ''
            word_source: signal_2
            use_pitch: true
            first_x: 300.0
            first_y: -100.0
            line_angle_deg: 90.0
            pitch_mm: 0.0
            last_x: 500.0
            last_y: -100.0
            place_z_mm: 0.0
            disk_radius_mm: 55.0
            word_gap_slots: 1
            angle_zero_deg: 0.0
            angle_invert: false
            min_confidence: 0.5
            settle_frames: 1
            use_trigger: false
            pick_source: pick_xy
            encoder_source: e_capture
            require_pick: true
        - plugin_name: robot_io
          plugin_class: Plugins.io.robot_io.plugin.RobotIoPlugin
          category: io
          config:
            device_id: robot_main
            job_source: robot_job
            forward_deque_maxlen: 64
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets: []
      description: раскладка слова (pick+place+доворот) → форвард роботу (robot_enqueue_job)
      protected: false
      category:
      metadata: {}
    - process_name: draw
      plugins:
        - plugin_name: circle_draw
          plugin_class: Plugins.render.circle_draw.plugin.CircleDrawPlugin
          category: rendering
          config:
            color_bgr:
              - 0
              - 255
              - 0
            thickness: 2
            show_radius: true
        - plugin_name: overlay_draw
          plugin_class: Plugins.render.overlay_draw.plugin.OverlayDrawPlugin
          category: rendering
          config: {}
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      target_process:
      chain_targets:
        - gui
      description:
      protected: false
      category:
      metadata:
        inspector:
          mode: join
          inputs:
            - frame
            - overlay
          primary: frame
          timeout_sec: 0.25
    - process_name: maskview
      plugins:
        - plugin_name: mask_to_frame
          plugin_class: Plugins.processing.mask_to_frame.plugin.MaskToFramePlugin
          category: processing
          config:
            source_key: mask
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: low
      target_process:
      chain_targets:
        - gui
      description:
      protected: false
      category:
      metadata: {}
    - process_name: phone
      plugins:
        - plugin_name: phone_camera
          plugin_class: Services.phone_gateway.plugin.plugin.PhoneCameraPlugin
          category: source
          config:
            camera_id: 9
            host: 0.0.0.0
            http_port: 8080
            resolution_width: 640
            resolution_height: 480
            auto_start: false
            show_hint: true
      workers: []
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: low
      target_process:
      chain_targets:
        - gui
        - layout
      description:
      protected: false
      category:
      metadata:
        source_target_fps: 10
  wires:
    - source: camera_0.hikvision.frame
      target: vision.color_convert.frame
      src_dtype:
      tgt_dtype:
      description: камера → вход vision (далее ROI→маска→морфо→круги линейно внутри процесса)
    - source: vision.circle_detector.frame
      target: recog.center_crop.frame
      src_dtype:
      tgt_dtype:
      description: кадр+детекции → crop (детекции едут в item, для radius-матчинга)
    - source: vision.circle_detector.detections
      target: line.line_filter.detections
      src_dtype:
      tgt_dtype:
      description: ''
    - source: vision.circle_detector.frame
      target: draw.circle_draw.frame
      src_dtype:
      tgt_dtype:
      description: ''
    - source: vision.circle_detector.detections
      target: draw.circle_draw.detections
      src_dtype:
      tgt_dtype:
      description: ''
    - source: vision.circle_detector.mask
      target: maskview.mask_to_frame.mask
      src_dtype:
      tgt_dtype:
      description: маска белого → отдельный дисплей для тюнинга
    - source: line.line_filter.overlay
      target: recog.center_crop.trigger_in
      src_dtype:
      tgt_dtype:
      description: триггер «диск пересёк линию» → один crop события
    - source: line.line_filter.overlay
      target: draw.overlay_draw.overlay
      src_dtype:
      tgt_dtype:
      description: ''
    - source: recog.ml_inference.predictions
      target: layout.word_layout.predictions
      src_dtype:
      tgt_dtype:
      description: буква+угол (+pick_xy/e_capture в item) → раскладка слова → робот
    - source: phone.phone_camera.signal_2
      target: layout.word_layout.word
      src_dtype:
      tgt_dtype:
      description: целевое слово с пульта телефона → раскладка (word_source=signal_2, латчится)
    - source: phone.phone_camera.signal_1
      target: layout.word_layout.return_trigger
      src_dtype:
      tgt_dtype:
      description: сигнал «вернуть всё на ленту» (кнопка телефона) → возврат выложенных букв + сброс
  displays:
    - node_id: draw.overlay_draw.frame
      display_id: main
    - node_id: recog.ml_inference.frame
      display_id: recog
    - node_id: maskview.mask_to_frame.frame
      display_id: mask
    - node_id: phone.phone_camera.frame
      display_id: phone
  metadata:
    gui_positions:
      camera_0.hikvision:
        - 16.0
        - 40.0
      vision.color_convert:
        - 16.0
        - 1120.0
      vision.roi_crop:
        - 212.37063046153224
        - 1113.6486033076817
      vision.hsv_mask:
        - 416.0
        - 1120.0
      vision.morphology:
        - 616.0
        - 1120.0
      vision.circle_detector:
        - 816.0
        - 1120.0
      line.line_filter:
        - 16.0
        - 400.0
      recog.center_crop:
        - 16.0
        - 1000.0
      recog.pixel_to_robot:
        - 216.0
        - 1000.0
      recog.ml_inference:
        - 416.0
        - 1000.0
      layout.word_layout:
        - 16.0
        - 280.0
      layout.robot_io:
        - 216.0
        - 280.0
      draw.circle_draw:
        - 16.0
        - 156.91823899371064
      draw.overlay_draw:
        - 216.0
        - 160.0
      maskview.mask_to_frame:
        - 16.0
        - 760.0
      phone.phone_camera:
        - 16.0
        - 880.0
      main:
        - 0.0
        - 480.0
      recog:
        - 600.0
        - 170.0
      mask:
        - 0.0
        - 600.0
      phone:
        - 600.0
        - 410.0
    locked_nodes: []
    name: default
    description: ''
displays:
  - id: main
    name: Кадр + круги + линия
    enabled: true
    width: 1280
    height: 720
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 0
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
    crop:
  - id: recog
    name: Распознанный диск (буква + угол)
    enabled: true
    width: 512
    height: 512
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 1000
      y: 0
    fit: contain
    scale: 100
    rotate: 0
    flip: none
    crop:
  - id: mask
    name: Маска белого (hsv_mask)
    enabled: true
    width: 1280
    height: 720
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 500
      y: 500
    fit: contain
    scale: 100
    rotate: 0
    flip: none
    crop:
  - id: phone
    name: Фото с телефона
    enabled: false
    width: 640
    height: 480
    format: BGR
    fps_limit: 30.0
    ring_buffer_blocks: 3
    position:
      x: 700
      y: 200
    fit: contain
    scale: 100
    rotate: 0
    flip: none
    crop:
created_at: ''
