# Рецепт dualcam_webcam — РЕАЛЬНАЯ вебкамера + синтетическая имитация 2-й камеры.
#
# Идея владельца (Ф7 G.7 Фаза 3): смешанный мультикамерный tier — camera_0 это
# настоящая вебкамера (CapturePlugin, device_id=0), camera_1 — синтетическая
# имитация второй камеры (SyntheticFrameSourcePlugin, camera_id=1). Оба владеют
# СВОИМ SHM-кольцом; FW_SHM_OWNER_INCARNATION разводит имена сегментов владельцев
# → кольца двух камер НЕ коллизируют. Отличие от dualcam_synth.yaml — только
# плагин camera_0 (реальная камера вместо синтетики).
#
# Тракт (4 процесса, 2 независимые границы IPC на кадр):
#   camera_0[capture, device=0] -> consumer_0[frame_counter]
#   camera_1[synthetic, id=1]   -> consumer_1[frame_counter]
#
# Запуск (headless soak Фазы 3, полный набор флагов):
#   BACKEND_CTL=1 FW_PERF_PROBES=1 FW_SHM_OWNER_INCARNATION=1 FW_SHM_SEQLOCK=1 \
#   FW_SHM_HANDLE_CACHE=1 FW_QOS_PROFILES=1 FW_SHM_ZERO_COPY=1 FW_SHM_LOAN_PROTOCOL=1 \
#   FW_DATA_PLANE_DICTS=1 FW_USE_KIND_CHANNELS=1 FW_GC_FREEZE=1 \
#   python -m backend_ctl.g7_dualcam_probe   (нужна подключённая камера на device_id=0)
name: dualcam_webcam
version: 1
description: "Реальная вебкамера + синтетическая 2-я камера — Ф7 G.7 мультикамерный soak"

blueprint:
  name: dualcam_webcam
  description: "Вебкамера (camera_0) + синтетическая имитация (camera_1), раздельные SHM-кольца"

  processes:
    # --- Камера 0: РЕАЛЬНАЯ вебкамера (cv2.VideoCapture, device_id=0) ---
    - process_name: camera_0
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: high
      chain_targets:
        - consumer_0
      source_target_fps: 30
      # Авто-рестарт source-камеры (Ф3.8): краш плагина → монитор пересоздаёт процесс.
      restart_policy: {enabled: true, max_retries: 3, window_sec: 60}
      plugins:
        - plugin_class: Plugins.sources.capture.plugin.CapturePlugin
          plugin_name: capture
          category: source
          camera_id: 0
          device_id: 0
          resolution_width: 640
          resolution_height: 480
          fps: 30
          # headless: без GUI некому послать start_capture → стартуем сами.
          auto_start: true

    # --- Камера 1: синтетическая имитация второй камеры ---
    - process_name: camera_1
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: high
      chain_targets:
        - consumer_1
      source_target_fps: 30
      plugins:
        - plugin_class: Plugins.sources.synthetic_frame_source.plugin.SyntheticFrameSourcePlugin
          plugin_name: synthetic_frame_source
          category: source
          camera_id: 1
          resolution_width: 640
          resolution_height: 480

    # --- Потребитель камеры 0 ---
    - process_name: consumer_0
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      chain_targets: []
      plugins:
        - plugin_class: Plugins.sources.frame_counter.plugin.FrameCounterPlugin
          plugin_name: frame_counter
          category: processing
          log_interval_sec: 5.0

    # --- Потребитель камеры 1 ---
    - process_name: consumer_1
      process_class: multiprocess_prototype.generic_process_app.GenericProcessApp
      priority: normal
      chain_targets: []
      plugins:
        - plugin_class: Plugins.sources.frame_counter.plugin.FrameCounterPlugin
          plugin_name: frame_counter
          category: processing
          log_interval_sec: 5.0

  wires:
    - source: camera_0.capture.frame
      target: consumer_0.frame_counter.frame
    - source: camera_1.synthetic_frame_source.frame
      target: consumer_1.frame_counter.frame
