# CAPABILITIES.yaml — «контактная книжка» бэкенда (capability manifest v1).
# ГЕНЕРИРУЕТСЯ: python -m backend_ctl.dump_capabilities — руками не править.
# CI-gate: backend_ctl/tests/test_capabilities.py сверяет с runtime (дрейф = красный).
channels:
- kind: QueueChannel
  name: ProcessManager_data
- kind: QueueChannel
  name: ProcessManager_local
- kind: QueueChannel
  name: ProcessManager_state
- kind: QueueChannel
  name: ProcessManager_system
- kind: SocketChannel
  name: backend_ctl
processes:
  ProcessManager:
    commands:
    - description: Применить секции observability и/или telemetry (логи, sink'и, publisher-gate, троттл)
        на лету
      name: config.reload
      params_schema:
      - name: observability
        required: false
        type: Dict
      - name: path
        required: false
        type: str
      tags:
      - system
    - description: ''
      name: flush_stats
      tags:
      - stats
    - description: ''
      name: get_metric
      tags:
      - stats
    - description: ''
      name: get_metrics
      tags:
      - stats
    - description: 'Диагностика: впрыснуть health-событие (report_error) — проверка канала наблюдаемости'
      name: health.report
      params_schema:
      - name: context
        required: false
        type: str
      - name: message
        required: false
        type: str
      - name: status
        required: false
        type: str
      tags:
      - health
      - system
    - description: Текущий снапшот здоровья процесса (status/errors/last_error)
      name: health.status
      tags:
      - health
      - system
    - description: 'Карточка процесса для «контактной книжки»: команды+descriptions, регистры (поля),
        router-handlers'
      name: introspect.capabilities
      tags:
      - system
    - description: Router message-handlers + команды CommandManager процесса
      name: introspect.handlers
      tags:
      - system
    - description: 'Инвентарь памяти процесса: SHM/пул/очереди (статистика, чего нет даже у GUI)'
      name: introspect.memory
      tags:
      - system
    - description: 'Каталог плагинов процесса: зарегистрированные + failed_imports (модули, упавшие на
        discover)'
      name: introspect.plugins
      tags:
      - system
    - description: Глубины очередей процесса (backpressure)
      name: introspect.queues
      tags:
      - system
    - description: Регистры процесса (имена + поля) из RegistersManager
      name: introspect.registers
      tags:
      - system
    - description: 'Счётчики router''а: sent_ok/received/dropped/errors (дошло ли сообщение)'
      name: introspect.router_stats
      tags:
      - system
    - description: Имя процесса, статус, воркеры (имена + статусы)
      name: introspect.status
      tags:
      - system
    - description: 'Readback телеметрийного gate: эффективная publish-секция + per-метрика (enabled, interval)'
      name: introspect.telemetry
      tags:
      - system
    - description: Подписать адрес на LogRecord'ы процесса с level ≥ порога (router-push)
      name: log.tail.subscribe
      params_schema:
      - name: command
        required: false
        type: str
      - name: level
        required: false
        type: str
      - name: subscriber
        required: false
        type: str
      tags:
      - system
    - description: Снять подписку на tail логов процесса
      name: log.tail.unsubscribe
      params_schema:
      - name: subscriber
        required: false
        type: str
      - name: tap
        required: false
        type: str
      tags:
      - system
    - description: Выключить sink логгера по имени (unregister_channel)
      name: logger.sink.disable
      params_schema:
      - name: name
        required: false
        type: str
      - name: sink
        required: false
        type: str
      tags:
      - system
    - description: Включить sink логгера по имени (register_channel)
      name: logger.sink.enable
      params_schema:
      - name: name
        required: false
        type: str
      - name: sink
        required: false
        type: str
      tags:
      - system
    - description: Подписать GUI-адрес на live-хвост наблюдаемости (log/stats/error → observability.record)
      name: observability.tail.subscribe
      params_schema:
      - name: subscriber
        required: false
        type: str
      tags:
      - system
    - description: Снять подписку на live-хвост наблюдаемости процесса
      name: observability.tail.unsubscribe
      params_schema:
      - name: subscriber
        required: false
        type: str
      tags:
      - system
    - description: 'Router endpoint: вложенная команда PM'
      name: process.command
      tags:
      - system
    - description: Создать процесс из inline-конфига
      name: process.create
      tags:
      - system
    - description: Список всех процессов и статусов
      name: process.list
      tags:
      - system
    - description: Поставить процесс на паузу
      name: process.pause
      tags:
      - system
    - description: 'Relay: доставить команду в целевой процесс через свежий PSR PM'
      name: process.relay
      tags:
      - system
    - description: Перезапустить именованный процесс
      name: process.restart
      tags:
      - system
    - description: Возобновить процесс
      name: process.resume
      tags:
      - system
    - description: Запустить именованный процесс
      name: process.start
      tags:
      - system
    - description: Статус именованного процесса
      name: process.status
      tags:
      - system
    - description: Остановить именованный процесс
      name: process.stop
      tags:
      - system
    - description: ''
      name: reset_metrics
      tags:
      - stats
    - description: Переслать недоставляемый push-билет своим router'ом (хаб-релей к внешним подписчикам)
      name: router.relay
      params_schema:
      - name: ticket
        required: false
        type: Dict
      tags:
      - system
    - description: 'Диагностика: отправить inner-билет соседу (peer→peer доставка после switch)'
      name: routing.probe
      params_schema:
      - name: inner
        required: false
        type: Dict
      - name: target
        required: false
        type: str
      tags:
      - system
    - description: 'Сверка снимка routing-epoch: сброс стейл-очередей соседей (Ф3.1)'
      name: routing.refresh
      params_schema:
      - name: epoch
        required: false
        type: int
      - name: hub
        required: false
        type: str
      - name: processes
        required: false
        type: Dict
      - name: reason
        required: false
        type: str
      - name: ts
        required: false
        type: float
      tags:
      - system
    - description: Удалить узел/поддерево по пути
      name: state.delete
      tags:
      - state_store
    - description: Прочитать значение из дерева
      name: state.get
      tags:
      - state_store
    - description: Прочитать поддерево
      name: state.get_subtree
      tags:
      - state_store
    - description: Глубокий merge dict в поддерево
      name: state.merge
      tags:
      - state_store
    - description: Установить значение в дереве
      name: state.set
      tags:
      - state_store
    - description: Подписаться на изменения
      name: state.subscribe
      tags:
      - state_store
    - description: Отписаться от подписки
      name: state.unsubscribe
      tags:
      - state_store
    - description: Отписать все подписки процесса
      name: state.unsubscribe_all
      tags:
      - state_store
    - description: ''
      name: stats_snapshot
      tags:
      - diagnostics
      - stats
    - description: 'Supervision-снимок: epoch + per-process incarnation/restart_count/last_exit/status/pid/started_at/instance_restarts.
        Маркер замены инстанса = pid+instance_restarts (считает и ручные, и авто-рестарты supervision
        — они идут той же process.restart). incarnation растёт только при смене identity очередей; restart_count
        — краш-рестарты монитора'
      name: supervision.status
      tags:
      - system
    - description: Завершить систему
      name: system.shutdown
      tags:
      - system
    - description: Статистика системы
      name: system.stats
      tags:
      - system
    - description: 'Телеметрия через PM: publish → всем детям (fan-out) ИЛИ адресно (data.target), throttle
        → центральный троттл оркестратора; cap-детекция на обоих путях'
      name: telemetry.broadcast
      tags:
      - system
    - description: 'Рантайм-переконфигурация телеметрии: publisher-gate (publish) и/или троттл (throttle)'
      name: telemetry.reconfigure
      tags:
      - system
    - description: Применить топологию процессов
      name: topology.apply
      tags:
      - system
    - description: Вычислить diff топологии (dry-run)
      name: topology.diff
      tags:
      - system
    - description: Получить текущую топологию
      name: topology.get
      tags:
      - system
    - description: Настроить wire middleware (SHM sender/receiver)
      name: wire.configure
      params_schema:
      - name: buffer_slots
        required: false
        type: int
      - name: role
        required: false
        type: str
      - name: shm_name
        required: false
        type: str
      - name: shm_owner
        required: false
        type: str
      - name: wire_key
        required: false
        type: str
      tags:
      - system
    - description: Удалить wire middleware
      name: wire.deconfigure
      params_schema:
      - name: wire_key
        required: false
        type: str
      tags:
      - system
    - description: Настроить wire-канал (SHM + routes)
      name: wire.setup
      tags:
      - system
    - description: Статусы wire-каналов
      name: wire.status
      tags:
      - system
    - description: Разобрать wire-канал
      name: wire.teardown
      tags:
      - system
    - description: Создать воркер в процессе
      name: worker.create
      params_schema:
      - name: config
        required: false
        type: Dict
      - name: execution_mode
        required: false
        type: str
      - name: max_restarts
        required: false
        type: int
      - name: priority
        required: false
        type: str
      - name: restart_on_failure
        required: false
        type: bool
      - name: target_interval_ms
        required: false
        type: int
      - name: worker_class
        required: false
        type: str
      - name: worker_name
        required: false
        type: str
      - name: worker_type
        required: false
        type: str
      tags:
      - system
    - description: Дренаж воркера (пауза+дождаться кадра); remove=True → drain→detach→stop
      name: worker.drain
      tags:
      - system
    - description: Поставить все прикладные воркеры процесса на паузу
      name: worker.pause_all
      tags:
      - system
    - description: Удалить воркер из процесса
      name: worker.remove
      params_schema:
      - name: worker_name
        required: false
        type: str
      tags:
      - system
    - description: Перезапустить воркер
      name: worker.restart
      params_schema:
      - name: worker_name
        required: false
        type: str
      tags:
      - system
    - description: Возобновить все прикладные воркеры процесса
      name: worker.resume_all
      tags:
      - system
    - description: Запустить остановленный воркер
      name: worker.start
      params_schema:
      - name: worker_name
        required: false
        type: str
      tags:
      - system
    - description: Остановить воркер (без удаления)
      name: worker.stop
      params_schema:
      - name: worker_name
        required: false
        type: str
      tags:
      - system
    - description: Перенастроить воркер (приоритет/интервал)
      name: worker.update
      params_schema:
      - name: config
        required: false
        type: Dict
      - name: execution_mode
        required: false
        type: str
      - name: max_restarts
        required: false
        type: int
      - name: priority
        required: false
        type: str
      - name: restart_on_failure
        required: false
        type: bool
      - name: target_interval_ms
        required: false
        type: int
      - name: worker_class
        required: false
        type: str
      - name: worker_name
        required: false
        type: str
      - name: worker_type
        required: false
        type: str
      tags:
      - system
    registers: {}
    router_handlers:
    - heartbeat
