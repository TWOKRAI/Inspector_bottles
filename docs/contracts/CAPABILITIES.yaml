# CAPABILITIES.yaml — «контактная книжка» бэкенда (capability manifest v0).
# ГЕНЕРИРУЕТСЯ: python -m backend_ctl.dump_capabilities — руками не править.
# CI-gate: backend_ctl/tests/test_capabilities.py сверяет с runtime (дрейф = красный).
channels:
- kind: QueueChannel
  name: ProcessManager_data
- kind: QueueChannel
  name: ProcessManager_local
- kind: QueueChannel
  name: ProcessManager_system
- kind: SocketChannel
  name: backend_ctl
- kind: QueueChannel
  name: system_events
processes:
  ProcessManager:
    commands:
    - description: Перечитать/применить секцию observability (уровень логов, sink'и) на лету
      name: config.reload
      tags:
      - system
    - description: ''
      name: flush_stats
      tags:
      - stats
    - description: ''
      name: get_metric
      tags:
      - stats
    - description: ''
      name: get_metrics
      tags:
      - stats
    - description: 'Диагностика: впрыснуть health-событие (report_error) — проверка канала наблюдаемости'
      name: health.report
      tags:
      - health
      - system
    - description: Текущий снапшот здоровья процесса (status/errors/last_error)
      name: health.status
      tags:
      - health
      - system
    - description: 'Карточка процесса для «контактной книжки»: команды+descriptions, регистры (поля),
        router-handlers'
      name: introspect.capabilities
      tags:
      - system
    - description: Router message-handlers + команды CommandManager процесса
      name: introspect.handlers
      tags:
      - system
    - description: 'Каталог плагинов процесса: зарегистрированные + failed_imports (модули, упавшие на
        discover)'
      name: introspect.plugins
      tags:
      - system
    - description: Глубины очередей процесса (backpressure)
      name: introspect.queues
      tags:
      - system
    - description: Регистры процесса (имена + поля) из RegistersManager
      name: introspect.registers
      tags:
      - system
    - description: 'Счётчики router''а: sent_ok/received/dropped/errors (дошло ли сообщение)'
      name: introspect.router_stats
      tags:
      - system
    - description: Имя процесса, статус, воркеры (имена + статусы)
      name: introspect.status
      tags:
      - system
    - description: Подписать адрес на LogRecord'ы процесса с level ≥ порога (router-push)
      name: log.tail.subscribe
      tags:
      - system
    - description: Снять подписку на tail логов процесса
      name: log.tail.unsubscribe
      tags:
      - system
    - description: Выключить sink логгера по имени (unregister_channel)
      name: logger.sink.disable
      tags:
      - system
    - description: Включить sink логгера по имени (register_channel)
      name: logger.sink.enable
      tags:
      - system
    - description: 'Router endpoint: вложенная команда PM'
      name: process.command
      tags:
      - system
    - description: Создать процесс из inline-конфига
      name: process.create
      tags:
      - system
    - description: Список всех процессов и статусов
      name: process.list
      tags:
      - system
    - description: Поставить процесс на паузу
      name: process.pause
      tags:
      - system
    - description: 'Relay: доставить команду в целевой процесс через свежий PSR PM'
      name: process.relay
      tags:
      - system
    - description: Перезапустить именованный процесс
      name: process.restart
      tags:
      - system
    - description: Возобновить процесс
      name: process.resume
      tags:
      - system
    - description: Запустить именованный процесс
      name: process.start
      tags:
      - system
    - description: Статус именованного процесса
      name: process.status
      tags:
      - system
    - description: Остановить именованный процесс
      name: process.stop
      tags:
      - system
    - description: ''
      name: reset_metrics
      tags:
      - stats
    - description: Переслать недоставляемый push-билет своим router'ом (хаб-релей к внешним подписчикам)
      name: router.relay
      tags:
      - system
    - description: 'Диагностика: отправить inner-билет соседу (peer→peer доставка после switch)'
      name: routing.probe
      tags:
      - system
    - description: 'Сверка снимка routing-epoch: сброс стейл-очередей соседей (Ф3.1)'
      name: routing.refresh
      tags:
      - system
    - description: Прочитать значение из дерева
      name: state.get
      tags:
      - state_store
    - description: Прочитать поддерево
      name: state.get_subtree
      tags:
      - state_store
    - description: Глубокий merge dict в поддерево
      name: state.merge
      tags:
      - state_store
    - description: Установить значение в дереве
      name: state.set
      tags:
      - state_store
    - description: Подписаться на изменения
      name: state.subscribe
      tags:
      - state_store
    - description: Отписаться от подписки
      name: state.unsubscribe
      tags:
      - state_store
    - description: Отписать все подписки процесса
      name: state.unsubscribe_all
      tags:
      - state_store
    - description: ''
      name: stats_snapshot
      tags:
      - diagnostics
      - stats
    - description: Завершить систему
      name: system.shutdown
      tags:
      - system
    - description: Статистика системы
      name: system.stats
      tags:
      - system
    - description: Применить топологию процессов
      name: topology.apply
      tags:
      - system
    - description: Вычислить diff топологии (dry-run)
      name: topology.diff
      tags:
      - system
    - description: Получить текущую топологию
      name: topology.get
      tags:
      - system
    - description: Настроить wire middleware (SHM sender/receiver)
      name: wire.configure
      tags:
      - system
    - description: Удалить wire middleware
      name: wire.deconfigure
      tags:
      - system
    - description: Настроить wire-канал (SHM + routes)
      name: wire.setup
      tags:
      - system
    - description: Статусы wire-каналов
      name: wire.status
      tags:
      - system
    - description: Разобрать wire-канал
      name: wire.teardown
      tags:
      - system
    - description: Создать воркер в процессе
      name: worker.create
      tags:
      - system
    - description: Поставить все прикладные воркеры процесса на паузу
      name: worker.pause_all
      tags:
      - system
    - description: Удалить воркер из процесса
      name: worker.remove
      tags:
      - system
    - description: Перезапустить воркер
      name: worker.restart
      tags:
      - system
    - description: Возобновить все прикладные воркеры процесса
      name: worker.resume_all
      tags:
      - system
    - description: Запустить остановленный воркер
      name: worker.start
      tags:
      - system
    - description: Остановить воркер (без удаления)
      name: worker.stop
      tags:
      - system
    - description: Перенастроить воркер (приоритет/интервал)
      name: worker.update
      tags:
      - system
    registers: {}
    router_handlers:
    - heartbeat
