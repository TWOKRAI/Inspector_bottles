# CI — прагматичный минимум для headless-среды (без железа: камер, GigE, GUI-дисплея).
#
# Что гоняется:
#   * lint     — ruff (advisory: в репозитории есть накопленный lint-долг, поэтому job
#                НЕ блокирует; убрать continue-on-error после разбора долга).
#   * validate — python scripts/validate.py (blocking, зелёный: импорты модулей,
#                interfaces.py, README/STATUS, синхронизация ADR).
#   * tests    — тесты фреймворка через scripts/run_framework_tests.py (blocking, зелёный
#                headless: ~3800 тестов за ~90 c под QT_QPA_PLATFORM=offscreen).
#
# Что СОЗНАТЕЛЬНО исключено (расширить позже, когда появится headless-safe путь):
#   * pyright  — gradual typing (basic mode) ещё не вычищен; включить отдельным advisory
#                job'ом после стабилизации типов.
#   * тесты прототипа/GUI, требующие живого дисплея, камер или GigE-железа.
#   * harness_smoke — live-тесты, поднимающие headless-бэкенд прототипа (маркер
#                harness_smoke, запускаются явным путём, не входят в дефолтный сбор).

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Отменяем предыдущие прогоны для той же ветки/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: lint (ruff, advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Синхронизация зависимостей
        run: uv sync

      # advisory: в репозитории есть накопленный lint-долг (~19 нарушений по разным
      # слоям). Job показывает результат, но не роняет CI. Убрать continue-on-error,
      # когда долг вычищен — тогда lint станет полноценным gate.
      - name: ruff check
        continue-on-error: true
        run: uv run ruff check .

      - name: ruff format --check
        continue-on-error: true
        run: uv run ruff format --check .

  validate:
    name: validate (structure)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Синхронизация зависимостей
        run: uv sync

      - name: Валидация структуры проекта
        run: uv run python scripts/validate.py

  tests:
    name: tests (framework, headless)
    runs-on: ubuntu-latest
    env:
      # PySide6 без дисплея: offscreen-платформа Qt.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      # Системные Qt-рантайм-библиотеки для offscreen-плагина PySide6.
      - name: Установка системных Qt-зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Установка uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Синхронизация зависимостей
        run: uv sync

      - name: Тесты фреймворка (headless)
        run: uv run python scripts/run_framework_tests.py -q -p no:cacheprovider
