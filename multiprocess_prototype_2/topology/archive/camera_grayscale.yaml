# Camera → Grayscale processing (Phase 5 data pipeline)
#
# Процессы:
#   camera_0    — produce(): захват кадров
#   processor_0 — process(): grayscale BGR → Gray → BGR 3ch
#
# chain_targets: camera_0 → processor_0

name: camera_grayscale
description: "Camera capture → Grayscale processing"

processes:
  - process_name: camera_0
    priority: high
    chain_targets:
      - processor_0
    source_target_fps: 25
    plugins:
      - plugin_class: multiprocess_prototype_2.plugins.capture.plugin.CapturePlugin
        plugin_name: capture
        category: source
        camera_id: 0
        device_id: 0

  - process_name: processor_0
    priority: normal
    plugins:
      - plugin_class: multiprocess_prototype_2.plugins.grayscale.plugin.GrayscalePlugin
        plugin_name: grayscale
        category: processing

wires:
  - source: camera_0.capture.frame
    target: processor_0.grayscale.frame
    description: "BGR-кадры с камеры → grayscale конвертация"
