# Camera → ColorMask HSV filtering (Phase 5 data pipeline)
#
# Процессы:
#   camera_0    — produce(): захват кадров
#   processor_0 — process(): color_mask BGR → HSV → inRange → mask
#
# Runtime tuning: команда set_hsv_range

name: camera_color_mask
description: "Camera capture → ColorMask HSV filtering (runtime threshold tuning)"

processes:
  - process_name: camera_0
    priority: high
    chain_targets:
      - processor_0
    source_target_fps: 25
    plugins:
      - plugin_class: multiprocess_prototype_2.plugins.capture.plugin.CapturePlugin
        plugin_name: capture
        category: source
        camera_id: 0
        device_id: 0

  - process_name: processor_0
    priority: normal
    plugins:
      - plugin_class: multiprocess_prototype_2.plugins.color_mask.plugin.ColorMaskPlugin
        plugin_name: color_mask
        category: processing
        h_min: 35
        h_max: 85
        s_min: 50
        s_max: 255
        v_min: 50
        v_max: 255

wires:
  - source: camera_0.capture.frame
    target: processor_0.color_mask.frame
    description: "BGR-кадры → HSV color mask"
