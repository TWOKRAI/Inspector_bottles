app_name: "my_awesome_app"
enable_batching: true
batch_size: 100
batch_interval: 1.0
default_level: INFO

channels:
  console:
    type: console
    enabled: true
    format: "[{timestamp}] [{level}] {module}: {message}"
  
  app_file:
    type: file
    enabled: true
    file_path: "logs/app.log"
    max_size: 10485760
    backup_count: 5
    format: "{timestamp} [{level}] {module}: {message}"
  
  error_file:
    type: file  
    enabled: true
    file_path: "logs/errors.log"
    max_size: 5242880
    backup_count: 3
  
  http_collector:
    type: http
    enabled: false  # Включить для продакшена
    url: "https://logs.example.com/api/v1/logs"
    headers:
      Authorization: "Bearer your-token"
      Content-Type: "application/json"

scopes:
  system:
    enabled: true
    min_level: INFO
    channels: [console, app_file]
    modules: [main, network, database]
  
  business:
    enabled: true  
    min_level: INFO
    channels: [app_file]
  
  performance:
    enabled: true
    min_level: WARNING  # Только медленные операции
    channels: [app_file]
  
  audit:
    enabled: true
    min_level: INFO
    channels: [app_file]
  
  security:
    enabled: true
    min_level: INFO
    channels: [app_file, error_file]
  
  debug:
    enabled: false  # Выключено в продакшене
    min_level: DEBUG
    channels: [console]  # Только в консоль при разработке

# Конфигурация модулей для отдельных файлов логирования
# Можно динамически включать/выключать через ConfigManager
modules:
  command_manager:
    enabled: true
    file_path: "logs/command_manager.log"
    min_level: DEBUG
  
  router_manager:
    enabled: false  # По умолчанию выключено, можно включить динамически
    file_path: "logs/router_manager.log"
    min_level: INFO
  
  # Пример: можно добавить любой модуль
  # vision_process:
  #   enabled: true
  #   file_path: "logs/vision_process.log"
  #   min_level: INFO