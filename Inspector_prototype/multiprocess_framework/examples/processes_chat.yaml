# config/processes.yaml
# для примера
_meta:
  class_config_validation: src.Modules.Process_manager_module.process_config.ProcessConfig
  version: 1.0.0

# Конфигурация процессов
processes:
  chatProcess1:
    name: Alice
    class: src.Test_example.multiprocess_chat_app.ChatProcess
    class_config_validation: src.Modules.Process_manager_module.process_config.ProcessConfig
    priority: high
    enabled: true
    console:
      enabled: true  # Включаем родную консоль процесса
      # recipient не указан - будет только родная консоль "Alice"
      title: "Alice Chat Console"  # Заголовок родной консоли
    config:
      chat_name: Алиса
    queues:
      system:
        maxsize: 100
      data:
        maxsize: 50
      image:
        maxsize: 10
  
  chatProcess2:
    name: Bob
    class: src.Test_example.multiprocess_chat_app.ChatProcess
    class_config_validation: src.Modules.Process_manager_module.process_config.ProcessConfig
    priority: high
    enabled: true
    console:
      enabled: true  # Включаем родную консоль
      recipient: "shared_chat_console"  # Дублируем вывод в общую консоль
      title: "Bob Console"  # Заголовок родной консоли Bob
    config:
      chat_name: Боб
    queues:
      system:
        maxsize: 100
      data:
        maxsize: 50
      image:
        maxsize: 10

  chatProcess3:
    name: Charlie
    class: src.Test_example.multiprocess_chat_app.ChatProcess
    class_config_validation: src.Modules.Process_manager_module.process_config.ProcessConfig
    priority: high
    enabled: true
    console:
      enabled: true  # Включаем родную консоль
      recipient: "shared_chat_console"  # Дублируем вывод в общую консоль (как у Bob)
      title: "Charlie Console"  # Заголовок родной консоли Charlie
    config:
      chat_name: Чарли
    queues:
      system:
        maxsize: 100
      data:
        maxsize: 50
      image:
        maxsize: 10
