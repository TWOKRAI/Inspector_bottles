schema_version: ManagersConfigLite       # Версия схемы (managers_schema_lite)
schema_type: multiprocess_prototype.schemas.managers
register_dispatch:                        # Метаданные диспетчеризации
  process_targets: [processor]
  channel: control_managers
config:                                   # Основная конфигурация
  logger:                                 # Конфигурация логгера
    app_name: inspector
    default_level: INFO
    enable_batching: true
    batch_size: 100
    batch_interval: 1.0
    channels:                             # Каналы логирования
      system_file: {...}
      messages_file: {...}
      console: {...}
    scopes:                               # Скоупы (SYSTEM, BUSINESS, PERFORMANCE, DEBUG)
      SYSTEM:
        enabled: true
        min_level: WARNING
        channels: [console, system_file]
      ...
    modules:                              # Модули (router_messages, database, processor...)
      router_messages: {...}
      database: {...}
      processor: {...}
      processor_frames: {...}             # rotate: false для Windows
      camera: {...}
      renderer: {...}
      robot: {...}
      gui: {...}
  error:                                  # Обработка ошибок
    error_file_path: errors.log
    critical_file_path: critical.log
    warnings_file_path: warnings.log
    include_stacktrace: true
  stats:                                  # Статистика
    enable_logging: true
  router:                                 # Роутер
    duplicate_messages_to_logger: true