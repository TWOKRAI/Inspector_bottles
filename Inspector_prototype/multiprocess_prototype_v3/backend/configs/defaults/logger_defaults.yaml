# Дефолты секции logger (channels / scopes / modules) для managers_schema_lite.
# Пути file_path — имена файлов в каталоге логов; полные пути собирает код при необходимости.
# BUSINESS.min_level после загрузки перезаписывается из INSPECTOR_LOG_LEVEL.

channels:
  system_file:
    type: file
    enabled: true
    file_path: system.log
    max_size: 10485760
    backup_count: 5
    format: "%(asctime)s [%(levelname)s] [%(proc_name)s] %(name)s: %(message)s"
  messages_file:
    type: file
    enabled: true
    file_path: messages.log
    max_size: 10485760
    backup_count: 5
    format: "%(asctime)s [%(levelname)s] [%(proc_name)s] %(name)s: %(message)s"
  console:
    type: console
    enabled: true
    format: "%(asctime)s [%(levelname)s] [%(proc_name)s] %(name)s: %(message)s"

scopes:
  SYSTEM:
    enabled: true
    min_level: WARNING
    channels:
      - console
      - system_file
  BUSINESS:
    enabled: true
    min_level: INFO
    channels:
      - system_file
      - messages_file
  PERFORMANCE:
    enabled: true
    min_level: INFO
    channels:
      - system_file
  DEBUG:
    enabled: true
    min_level: DEBUG
    channels:
      - system_file

modules:
  router_messages:
    enabled: true
    file_path: messages.log
    min_level: DEBUG
  database:
    enabled: true
    file_path: database.log
    min_level: INFO
  processor:
    enabled: true
    file_path: processor.log
    min_level: INFO
  processor_frames:
    enabled: true
    file_path: frames.log
    min_level: DEBUG
    rotate: false
  camera:
    enabled: true
    file_path: camera.log
    min_level: INFO
  renderer:
    enabled: true
    file_path: renderer.log
    min_level: INFO
  robot:
    enabled: true
    file_path: robot.log
    min_level: INFO
  gui:
    enabled: true
    file_path: gui.log
    min_level: INFO
