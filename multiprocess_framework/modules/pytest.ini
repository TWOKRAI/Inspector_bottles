[pytest]
# Корректный запуск:
#   cd Inspector_prototype && python scripts/run_framework_tests.py
# или:
#   cd Inspector_prototype/multiprocess_framework/modules && python -m pytest
#
# Все импорты в коде и тестах — каноничные:
#   from multiprocess_framework.modules.<module> import ...
# Поэтому pythonpath здесь не нужен; пакет multiprocess_framework доступен через
# editable installation Inspector_prototype (uv sync / pip install -e).

# pytest-asyncio: режим auto — декораторы @pytest.mark.asyncio не нужны явно
asyncio_mode = auto

# pytest-qt: использовать PySide6 (PyQt5 удалён из venv)
qt_api = pyside6

markers =
    # frontend-constructor Ф1 (T1.2): тесты Gen-1 frontend_module (application/,
    # core.window_registry, schemas.widget_descriptor/window_config, windows.loading_window) —
    # freeze, не kill (Р4 plans/frontend-constructor/plan.md). Инвентарь — frontend_module/STATUS.md.
    legacy_gen1: тесты первого (мёртвого для v3) поколения frontend_module

testpaths =
    actions_module/tests
    actions_module/handlers/tests
    app_module/tests
    base_manager/tests
    chain_module/tests
    channel_routing_module/tests
    command_module/tests
    config_module/tests
    console_module/tests
    data_schema_module/tests
    display_module/tests
    dispatch_module/tests
    error_module/tests
    event_module/tests
    frontend_module/tests
    frontend_module/graph/tests
    logger_module/tests
    message_module/tests
    process_manager_module/tests
    process_module/tests
    process_module/plugins/tests
    recipe/tests
    registers_module/tests
    router_module/tests
    service_module/tests
    shared_resources_module/tests
    shared_resources_module/buffers/tests
    shared_resources_module/memory/tests
    state_store_module/tests
    statistics_module/tests
    worker_module/tests
