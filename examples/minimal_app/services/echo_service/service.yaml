# service.yaml — маркер сервиса (Ф5.11).
#
# Наличие этого файла делает каталог «сервисом» для авто-скана app_module.discover
# (симметрично plugin.py для плагина и app.yaml для приложения). Формат — тот же
# version+extras контракт, что у манифеста приложения и плагина.
#
# Сервис в minimal_app тривиален: доказывает, что авто-скан находит И плагин, И
# сервис из указанной в app.yaml папки. Реальный сервис несёт код (клиент/адаптер),
# потребляемый плагинами/топологией.

name: echo_service
version: 1
extras:
  purpose: demo
