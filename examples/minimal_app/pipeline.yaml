# examples/minimal_app — pipeline (плоская топология).
#
# Два процесса на БАЗОВОМ framework-классе GenericProcess (не прототип): «рыба»
# бутится на дефолтах фреймворка. `ticker` шлёт тик каждую секунду межпроцессным
# сообщением (send_message) в `console_sink`, который его считает — живое
# IPC-доказательство (Ф5.13; ревью 5.11 отметило, что пустой `wires: []` этого
# не показывает). `wires:` здесь намеренно остаётся пуст — это НЕ ошибка: формат
# `wires:` в topology-схеме (`process_manager_module/topology/blueprint.py`) —
# типизированный data-plane граф кадров/изображений (SHM), избыточный для простого
# dict-сообщения между headless-плагинами; для него framework даёт отдельный
# канонический путь `ctx.send_message`/`ctx.router_manager.register_message_handler`
# (см. `multiprocess_framework/docs/AGENT_CHEATSHEET.md`).

name: minimal
description: "Минимальный headless-пример: tick-источник → consumer через IPC"

processes:
  - process_name: ticker
    process_class: multiprocess_framework.modules.process_module.generic.generic_process.GenericProcess
    priority: normal
    plugins:
      - plugin_class: examples.minimal_app.plugins.tick_source.plugin.TickSourcePlugin
        plugin_name: tick_source
        category: utility
        interval_sec: 1.0
        message: hello-from-minimal-app
        target: console_sink

  - process_name: console_sink
    process_class: multiprocess_framework.modules.process_module.generic.generic_process.GenericProcess
    priority: normal
    plugins:
      - plugin_class: examples.minimal_app.plugins.console_consumer.plugin.ConsoleConsumerPlugin
        plugin_name: console_consumer
        category: utility

wires: []
